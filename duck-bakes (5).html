// ── DB helpers ────────────────────────────────────────────────────────────────
async function dbSave(table, arr, profile=null) {
  try {
    if (profile) {
      await sb.from(table).delete().eq("profile", profile);
      if (arr.length > 0) {
        const rows = arr.map(item => ({ id: item.id, data: item, profile, updated_at: new Date().toISOString() }));
        await sb.from(table).upsert(rows);
      }
    } else {
      await sb.from(table).delete().neq("id", -1);
      if (arr.length > 0) {
        const rows = arr.map(item => ({ id: item.id, data: item, updated_at: new Date().toISOString() }));
        await sb.from(table).upsert(rows);
      }
    }
  } catch(e) { console.error("dbSave error", table, e); }
}

async function dbLoad(table, fallback, profile=null) {
  try {
    let query = sb.from(table).select("data").order("id");
    if (profile) query = query.eq("profile", profile);
    const { data, error } = await query;
    if (error) throw error;
    if (data && data.length > 0) return data.map(r => r.data);
  } catch(e) { console.error("dbLoad error", table, e); }
  return fallback;
}

// ── Likes ─────────────────────────────────────────────────────────────────────
async function getLikes(bakeId, bakeProfile) {
  const { data } = await sb.from("likes").select("liked_by").eq("bake_id", bakeId).eq("bake_profile", bakeProfile);
  return (data || []).map(r => r.liked_by);
}
async function toggleLike(bakeId, bakeProfile, likedBy) {
  const { data } = await sb.from("likes").select("id").eq("bake_id", bakeId).eq("bake_profile", bakeProfile).eq("liked_by", likedBy);
  if (data && data.length > 0) {
    await sb.from("likes").delete().eq("id", data[0].id);
    return false;
  } else {
    await sb.from("likes").insert({ bake_id: bakeId, bake_profile: bakeProfile, liked_by: likedBy });
    return true;
  }
}

// ── Comments ──────────────────────────────────────────────────────────────────
async function getComments(bakeId, bakeProfile) {
  const { data } = await sb.from("comments").select("*").eq("bake_id", bakeId).eq("bake_profile", bakeProfile).order("created_at");
  return data || [];
}
async function addComment(bakeId, bakeProfile, author, body) {

}

// ── Activity feed ─────────────────────────────────────────────────────────────
async function getActivity() {
  const [likesRes, commentsRes] = await Promise.all([
    sb.from("likes").select("*").order("created_at", { ascending: false }).limit(20),
    sb.from("comments").select("*").order("created_at", { ascending: false }).limit(20),
  ]);
  const likes = (likesRes.data || []).map(r => ({ ...r, type:"like" }));
  const comments = (commentsRes.data || []).map(r => ({ ...r, type:"comment" }));
  return [...likes, ...comments].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 15);
}

// ── AI recipe generation ──────────────────────────────────────────────────────
async function generateRecipeFromBake(bakeData) {
  const { freeformIngredients, freeformSteps, bulkTime, proofTime, ovenTemp, vessel, notes, folds } = bakeData;
  const ingList = freeformIngredients.filter(i=>i.name).map(i=>`${i.amount}${i.unit} ${i.name}`).join(", ");
  const stepList = freeformSteps.filter(Boolean).join(" | ");
  const foldSummary = folds?.length ? `${folds.length} folds (${folds.map(f=>f.technique).join(", ")})` : "";
  const flourKeywords = ["flour","farina","wheat","spelt","rye","einkorn","fife","semolina","blend"];
  const waterKeywords = ["water"];
  const flourItems = freeformIngredients.filter(i=>flourKeywords.some(k=>i.name.toLowerCase().includes(k)));
  const waterItems = freeformIngredients.filter(i=>waterKeywords.some(k=>i.name.toLowerCase().includes(k)));
  const totalFlour = flourItems.reduce((s,i)=>s+parseFloat(i.amount||0),0);
  const totalWater = waterItems.reduce((s,i)=>s+parseFloat(i.amount||0),0);
  const hydration = totalFlour>0 ? Math.round(totalWater/totalFlour*100) : 75;
  const prompt = `You are a sourdough baking assistant. A baker logged a bake with these details:
Ingredients: ${ingList}
Method notes: ${stepList || "none provided"}
Bulk ferment: ${bulkTime||"unknown"}, Cold proof: ${proofTime||"unknown"}
Oven: ${ovenTemp||"unknown"}, Vessel: ${vessel||"unknown"}
Folds: ${foldSummary||"none"}
Bake notes: ${notes||"none"}
Generate a sourdough recipe from this. Respond ONLY with valid JSON, no markdown, no backticks:
{"name":"short evocative recipe name (max 5 words)","description":"one sentence tasting notes","tags":["tag1","tag2"],"steps":["step 1","step 2","step 3","step 4","step 5","step 6"]}`;
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:600, messages:[{role:"user",content:prompt}] })
  });
  const data = await resp.json();
  const text = data.content?.[0]?.text||"{}";
  try {
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    return { ...parsed, hydration, autoGenerated:true };
  } catch(e) {
    return { name:"My Sourdough", description:"", tags:[], steps:[], hydration, autoGenerated:true };
  }
}

function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function getVimeoId(url) {
  if (!url) return null;
  const m = url.match(/vimeo\.com\/(\d+)/);
  return m ? m[1] : null;
}
function timeAgo(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// ── Likes & Comments widget ───────────────────────────────────────────────────
function LikesComments({ bake, bakeProfile, currentProfile, readOnly }) {
  const [likes, setLikes] = useState([]);
  const [comments, setComments] = useState([]);
  const [commentText, setCommentText] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      const [l, c] = await Promise.all([getLikes(bake.id, bakeProfile), getComments(bake.id, bakeProfile)]);
      setLikes(l); setComments(c); setLoading(false);
    })();
  }, [bake.id, bakeProfile]);

  async function handleLike() {
    const result = await toggleLike(bake.id, bakeProfile, currentProfile);
    setLikes(prev => result ? [...prev, currentProfile] : prev.filter(l => l !== currentProfile));
  }

  async function handleComment(e) {
    e.preventDefault();
    if (!commentText.trim()) return;
    await addComment(bake.id, bakeProfile, currentProfile, commentText.trim());
    const c = await getComments(bake.id, bakeProfile);
    setComments(c);
    setCommentText("");
  }

  const liked = likes.includes(currentProfile);
  if (loading) return <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>Loading…</div>;

  return (
    <div style={{ marginTop:14, paddingTop:12, borderTop:`1px solid ${C.border}` }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
        <button onClick={handleLike} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:4, fontSize:13, color: liked ? "#c17f2a" : C.muted, fontFamily:"Georgia,serif" }}>
          {liked ? "❤️" : "🤍"} {likes.length > 0 && <span style={{ fontFamily:"monospace", fontSize:11 }}>{likes.length}</span>}
        </button>
        {likes.length > 0 && (
          <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>
            {likes.map(l => PROFILES[l]?.emoji).join(" ")} {likes.map(l => PROFILES[l]?.label).join(", ")}
          </span>
        )}
      </div>
      {comments.length > 0 && (
        <div style={{ marginBottom:10 }}>
          {comments.map(c => (
            <div key={c.id} style={{ display:"flex", gap:8, marginBottom:7 }}>
              <span style={{ fontSize:14, flexShrink:0 }}>{PROFILES[c.author]?.emoji}</span>
              <div style={{ background:"#f5f0e8", borderRadius:"0 8px 8px 8px", padding:"6px 10px", flex:1 }}>
                <span style={{ fontFamily:"monospace", fontSize:9, color:PROFILES[c.author]?.color, fontWeight:700 }}>{PROFILES[c.author]?.label}</span>
                <span style={{ fontFamily:"monospace", fontSize:9, color:C.muted, marginLeft:6 }}>{timeAgo(c.created_at)}</span>
                <p style={{ fontSize:12, marginTop:2, lineHeight:1.5 }}>{c.body}</p>
              </div>
            </div>
          ))}
        </div>
      )}
      <div style={{ display:"flex", gap:6 }}>
        <input
          style={{ ...S.input, marginBottom:0, fontSize:12, padding:"6px 10px" }}
          placeholder={`Add a comment as ${PROFILES[currentProfile]?.label}…`}
          value={commentText}
          onChange={e=>setCommentText(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleComment(e)}
        />
        <button style={{ ...S.btn, padding:"6px 12px", fontSize:11, flexShrink:0 }} onClick={handleComment}>Post</button>
      </div>
    </div>

}

// ── Variant Ingredients Editor ────────────────────────────────────────────────
function VariantIngredientsEditor({ baseIngredients, variantIngredients, onChange }) {
  const rows = variantIngredients.length > 0 ? variantIngredients
    : baseIngredients.map(ing => ({ ...ing, baseAmount: ing.amount, baseName: ing.name, isNew: false }));
  function updateRow(idx, patch) { onChange(rows.map((r,i) => i===idx ? {...r,...patch} : r)); }
  function addRow() { onChange([...rows, { id: Date.now()+Math.random(), name:"", amount:"", unit:"g", baseAmount:null, baseName:null, isNew:true }]); }
  function removeRow(idx) { onChange(rows.filter((_,i) => i!==idx)); }
  useEffect(() => {
    if (variantIngredients.length === 0 && baseIngredients.length > 0)
      onChange(baseIngredients.map(ing => ({ ...ing, baseAmount: ing.amount, baseName: ing.name, isNew: false })));
  }, []);
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"2.5fr 1fr 60px 28px", gap:5, marginBottom:4 }}>
        {["Ingredient","Amount","Unit",""].map(h => <div key={h} style={{ ...S.label, marginBottom:0 }}>{h}</div>)}
      </div>
      {rows.map((row, idx) => {
        const amtChanged = row.baseAmount !== null && String(row.amount) !== String(row.baseAmount);
        const nameChanged = row.baseName !== null && row.name !== row.baseName;
        const changed = amtChanged || nameChanged || row.isNew;
        return (
          <div key={row.id} style={{ borderLeft:`3px solid ${changed?"#c17f2a":"transparent"}`, paddingLeft:7, marginBottom:5, background:changed?"#fdf5e6":"transparent", borderRadius:"0 3px 3px 0" }}>
            <div style={{ display:"grid", gridTemplateColumns:"2.5fr 1fr 60px 28px", gap:5, alignItems:"center" }}>
              <input style={{ ...S.input, marginBottom:0, borderColor:nameChanged||row.isNew?"#c17f2a":"#d0bc98", fontWeight:changed?"600":"400" }}
                value={row.name} onChange={e=>updateRow(idx,{name:e.target.value})} placeholder="Ingredient name"/>
              <input type="number" style={{ ...S.input, marginBottom:0, borderColor:amtChanged?"#c17f2a":"#d0bc98", color:amtChanged?"#8b5e3c":C.ink, fontWeight:amtChanged?"700":"400" }}
                value={row.amount} onChange={e=>updateRow(idx,{amount:e.target.value})} placeholder="0"/>
              <select style={{ ...S.input, marginBottom:0, padding:"7px 4px" }} value={row.unit} onChange={e=>updateRow(idx,{unit:e.target.value})}>
                <option>g</option><option>kg</option><option>ml</option><option>tsp</option><option>tbsp</option>
              </select>
              <button style={{ ...S.btnX, padding:"4px 6px", fontSize:13, lineHeight:1 }} onClick={()=>removeRow(idx)}>✕</button>
            </div>
          </div>
        );
      })}
      <button style={{ ...S.btnSm, marginTop:4 }} onClick={addRow}>+ Add ingredient</button>
    </div>
  );
}

// ── MiniBar & Sparkline ───────────────────────────────────────────────────────
function MiniBar({ value, max, color="#8b5e3c", height=18 }) {
  const pct = max > 0 ? Math.max(3, Math.round((value / max) * 100)) : 0;
  return (
    <div style={{ flex:1, background:"#f0e8d8", borderRadius:20, height, overflow:"hidden" }}>
      <div style={{ width:`${pct}%`, background:color, height:"100%", borderRadius:20, transition:"width 0.4s ease" }}/>
    </div>
  );
}
function Sparkline({ points, color="#8b5e3c", height=48 }) {
  if (points.length < 2) return null;
  const w=300, h=height, minV=Math.min(...points), maxV=Math.max(...points), range=maxV-minV||1;
  const xs=points.map((_,i)=>(i/(points.length-1))*w);
  const ys=points.map(v=>h-((v-minV)/range)*(h*0.8)-h*0.1);
  const d=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width:"100%", height, display:"block" }} preserveAspectRatio="none">
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map((x,i) => <circle key={i} cx={x} cy={ys[i]} r="3" fill={color}/>)}
    </svg>
  );
}

// ── Comparative Stats ─────────────────────────────────────────────────────────
function StatsView({ myBakes, theirBakes, recipes, myProfile }) {
  const other = otherProfile(myProfile);
  const profiles = [myProfile, other];

  function profileStats(bakes) {
    if (bakes.length === 0) return { total:0, avg:"—", variants:0, streak:0, topVessel:"—", topRecipeId:null };
    const total = bakes.length;
    const avg = (bakes.reduce((s,b)=>s+(b.rating||0),0)/total).toFixed(1);
    const variants = bakes.filter(b=>b.isVariant).length;
    const vesselCounts = {};
    bakes.forEach(b=>{ vesselCounts[b.vessel]=(vesselCounts[b.vessel]||0)+1; });
    const topVessel = Object.entries(vesselCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || "—";
    const recipeCounts = {};
    bakes.forEach(b=>{ recipeCounts[b.recipeId]=(recipeCounts[b.recipeId]||0)+1; });
    const topRecipeId = Object.entries(recipeCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
    const bakeDays = [...new Set(bakes.map(b=>b.date))].sort();
    let maxStreak=1, cur=1;
    for (let i=1;i<bakeDays.length;i++) {
      const diff=(new Date(bakeDays[i])-new Date(bakeDays[i-1]))/(1000*60*60*24);
      if (diff<=7) { cur++; maxStreak=Math.max(maxStreak,cur); } else cur=1;
    }
    const outcomeCounts = { excellent:0, good:0, okay:0, poor:0 };
    bakes.forEach(b=>{ if (outcomeCounts[b.outcome]!==undefined) outcomeCounts[b.outcome]++; });
    const chronoBakes = [...bakes].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const ratingPoints = chronoBakes.map(b=>b.rating||0).filter(Boolean);
    return { total, avg, variants, streak:maxStreak, topVessel, topRecipeId, outcomeCounts, ratingPoints, chronoBakes };
  }

  const stats = { [myProfile]: profileStats(myBakes), [other]: profileStats(theirBakes) };
  const allBakes = [...myBakes, ...theirBakes];
  const totalMax = Math.max(stats[myProfile].total, stats[other].total, 1);

  function StatRow({ label, myVal, theirVal, isWinner }) {
    const myW = myVal > theirVal;
    const theirW = theirVal > myVal;
    return (
      <div style={{ display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:8, alignItems:"center", marginBottom:10, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
        <div style={{ textAlign:"right" }}>
          <span style={{ fontSize:14, fontWeight:700, fontStyle:"italic", color: myW ? PROFILES[myProfile].color : C.ink }}>{myVal}</span>
          {myW && <span style={{ marginLeft:4 }}>🏆</span>}
        </div>
        <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, textAlign:"center", width:100 }}>{label}</div>
        <div style={{ textAlign:"left" }}>
          {theirW && <span style={{ marginRight:4 }}>🏆</span>}
          <span style={{ fontSize:14, fontWeight:700, fontStyle:"italic", color: theirW ? PROFILES[other].color : C.ink }}>{theirVal}</span>
        </div>
      </div>
    );
  }

  if (allBakes.length === 0) return (
    <div style={{ textAlign:"center", padding:60, color:"#8b6a50", fontStyle:"italic" }}>Log some bakes first!</div>
  );

  return (
    <div>
      <h1 style={S.title}>Stats</h1>
      <p style={{ ...S.sub, marginBottom:20 }}>Head to head</p>

      {/* Profile headers */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:8, marginBottom:6 }}>
        <div style={{ textAlign:"right" }}>
          <DuckBadge prof={myProfile}/>
          <div style={{ fontFamily:"monospace", fontSize:9, color:C.muted, marginTop:3 }}>you</div>
        </div>
        <div style={{ width:100 }}/>
        <div style={{ textAlign:"left" }}>
          <DuckBadge prof={other}/>
          <div style={{ fontFamily:"monospace", fontSize:9, color:C.muted, marginTop:3 }}>them</div>
        </div>
      </div>

      {/* Head to head stats */}
      <div style={S.card}>
        <StatRow label="total bakes" myVal={stats[myProfile].total} theirVal={stats[other].total}/>
        <StatRow label="avg rating" myVal={stats[myProfile].avg + "★"} theirVal={stats[other].avg + "★"}/>
        <StatRow label="variants" myVal={stats[myProfile].variants} theirVal={stats[other].variants}/>
        <StatRow label="bake streak" myVal={stats[myProfile].streak} theirVal={stats[other].streak}/>
        <div style={{ display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:8, alignItems:"center", marginBottom:4 }}>
          <div style={{ textAlign:"right", fontSize:12, fontStyle:"italic" }}>{stats[myProfile].topVessel}</div>
          <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, textAlign:"center", width:100 }}>fav vessel</div>
          <div style={{ textAlign:"left", fontSize:12, fontStyle:"italic" }}>{stats[other].topVessel}</div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:8, alignItems:"center" }}>
          <div style={{ textAlign:"right", fontSize:12, fontStyle:"italic" }}>{stats[myProfile].topRecipeId ? recipes.find(r=>r.id==stats[myProfile].topRecipeId)?.name || "—" : "—"}</div>
          <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, textAlign:"center", width:100 }}>fav recipe</div>
          <div style={{ textAlign:"left", fontSize:12, fontStyle:"italic" }}>{stats[other].topRecipeId ? recipes.find(r=>r.id==stats[other].topRecipeId)?.name || "—" : "—"}</div>
        </div>
      </div>

      {/* Bake volume bars */}
      <div style={S.card}>
        <div style={{ ...S.sh, marginBottom:12 }}>Bake volume</div>
        {profiles.map(p => (
          <div key={p} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
            <div style={{ width:28, fontSize:16 }}>{PROFILES[p].emoji}</div>
            <MiniBar value={stats[p].total} max={totalMax} color={PROFILES[p].color} height={22}/>
            <div style={{ width:24, fontFamily:"monospace", fontSize:12, fontWeight:700, color:PROFILES[p].color }}>{stats[p].total}</div>
          </div>
        ))}
      </div>

      {/* Outcome breakdown per duck */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        {profiles.map(p => {
          const oc = stats[p].outcomeCounts || {};
          const maxOC = Math.max(...Object.values(oc), 1);
          return (
            <div key={p} style={S.card}>
              <div style={{ ...S.sh, marginBottom:10 }}>{PROFILES[p].emoji} {PROFILES[p].label} outcomes</div>
              {Object.entries(OUTCOMES).map(([k,v])=>(
                <div key={k} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <div style={{ width:60, fontSize:11 }}>{v.label}</div>
                  <MiniBar value={oc[k]||0} max={maxOC} color={v.bg}/>
                  <div style={{ width:18, textAlign:"right", fontFamily:"monospace", fontSize:11, color:C.muted }}>{oc[k]||0}</div>
                </div>
              ))}
            </div>
          );
        })}
      </div>

      {/* Rating trends */}
      {profiles.map(p => stats[p].ratingPoints?.length >= 2 && (
        <div key={p} style={S.card}>
          <div style={{ ...S.sh, marginBottom:8 }}>{PROFILES[p].emoji} {PROFILES[p].label} — rating over time</div>
          <Sparkline points={stats[p].ratingPoints} color={PROFILES[p].color}/>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:"monospace", fontSize:9, color:C.muted, marginTop:4 }}>
            <span>{stats[p].chronoBakes?.[0]?.date}</span>
            <span>{stats[p].chronoBakes?.[stats[p].chronoBakes.length-1]?.date}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function Nav({ view, setView, saved, syncing, profile, onSwitchProfile }) {
  const onJ = ["journal","newBake"].includes(view);
  const onR = ["recipes","recipeDetail","newRecipe"].includes(view);
  const onP = view==="pantry";
  const onS = view==="stats";
  const prof = PROFILES[profile];
  return (
    <header style={S.header}>
      <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <div style={S.logo}>🦆 Duck Bakes</div>
        <div style={{ background: prof.color, color:"#fff", padding:"3px 10px", borderRadius:20, fontSize:11, fontFamily:"monospace", cursor:"pointer" }} onClick={onSwitchProfile}>
          {prof.emoji} {prof.label} ↓
        </div>
        {syncing && <span style={{ fontFamily:"monospace", fontSize:10, color:"#a0a890" }}>⏳</span>}
        {!syncing && saved && <span style={{ fontFamily:"monospace", fontSize:10, color:"#6a9a6a" }}>✓</span>}
      </div>
      <nav style={{ display:"flex", gap:2 }}>
        <button style={S.navBtn(onJ)} onClick={()=>setView("journal")}>Journal</button>
        <button style={S.navBtn(onR)} onClick={()=>setView("recipes")}>Recipes</button>
        <button style={S.navBtn(onP)} onClick={()=>setView("pantry")}>Pantry</button>
        <button style={S.navBtn(onS)} onClick={()=>setView("stats")}>Stats</button>
      </nav>
    </header>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [profile, setProfile] = useState(null);
  const [view, setView] = useState("journal");
  const [journalTab, setJournalTab] = useState("mine"); // mine | theirs | all
  const [myBakes, setMyBakes] = useState([]);
  const [theirBakes, setTheirBakes] = useState([]);
  const [recipes, setRecipes] = useState(BASE_RECIPES);
  const [flours, setFlours] = useState(DEFAULT_FLOURS);
  const [loaded, setLoaded] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [selRecipe, setSelRecipe] = useState(null);
  const [scale, setScale] = useState(1);
  const [bf, setBakeForm] = useState(emptyBake());
  const [rf, setRecipeForm] = useState({ name:"", author:"", description:"", hydration:75, tags:"", ingredients:[{id:Date.now(),name:"",amount:"",unit:"g"}], steps:[""] });
  const [modal, setModal] = useState(null);
  const [modalProfile, setModalProfile] = useState(null);
  const [saved, setSaved] = useState(false);
  const [editingBakeId, setEditingBakeId] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [recipePreview, setRecipePreview] = useState(null);
  const [generatingRecipe, setGeneratingRecipe] = useState(false);
  const [search, setSearch] = useState("");
  const [filterOutcome, setFilterOutcome] = useState("");

  // Load when profile selected
  useEffect(() => {
    if (!profile) return;
    setLoaded(false);
    const other = otherProfile(profile);
    (async () => {
      setSyncing(true);
      const [r, mb, tb, f] = await Promise.all([
        dbLoad("recipes", null),
        dbLoad("bakes", null, profile),
        dbLoad("bakes", null, other),
        dbLoad("flours", null),
      ]);
      if (r) setRecipes(r);
      setMyBakes(mb || []);
      setTheirBakes(tb || []);
      if (f) setFlours(f);
      setLoaded(true);
      setSyncing(false);
    })();
  }, [profile]);

  useEffect(() => { if (loaded) { setSyncing(true); dbSave("recipes", recipes).then(()=>setSyncing(false)); flashSaved(); } }, [recipes, loaded]);
  useEffect(() => { if (loaded && profile) { setSyncing(true); dbSave("bakes", myBakes, profile).then(()=>setSyncing(false)); flashSaved(); } }, [myBakes, loaded]);
  useEffect(() => { if (loaded) { setSyncing(true); dbSave("flours", flours).then(()=>setSyncing(false)); flashSaved(); } }, [flours, loaded]);

  function flashSaved() { setSaved(true); setTimeout(()=>setSaved(false), 2000); }

  if (!profile) return <ProfilePicker onSelect={p => setProfile(p)} />;

  if (!loaded) return (
    <div style={{ minHeight:"100vh", background:"#f5f0e8", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Playfair Display', Georgia, serif" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:40, marginBottom:16 }}>{PROFILES[profile]?.emoji}</div>
        <div style={{ fontFamily:"monospace", fontSize:13, color:"#8b6a50" }}>Loading {PROFILES[profile]?.label}'s journal…</div>
      </div>
    </div>
  );

  const other = otherProfile(profile);
  const set = patch => setBakeForm(p=>({...p,...patch}));
  const setR = patch => setRecipeForm(p=>({...p,...patch}));
  const getRecipe = id => recipes.find(r=>r.id===id);
  const sc = n => { const v=n*scale; return v%1===0?v:v.toFixed(1); };

  const navProps = { view, setView, saved, syncing, profile, onSwitchProfile:()=>{ setProfile(null); setLoaded(false); setView("journal"); } };

  function openModal(bake, bProf) { setModal(bake); setModalProfile(bProf); }

  function startEditBake(bake, e) {
    e.stopPropagation();
    setEditingBakeId(bake.id);
    setBakeForm({...bake, recipeId: String(bake.recipeId)});
    setView("newBake");
  }
  function deleteBake(id, e) { e.stopPropagation(); setDeleteConfirm(id); }
  function confirmDelete() { setMyBakes(myBakes.filter(b => b.id !== deleteConfirm)); setDeleteConfirm(null); }

  async function saveBake() {
    if (bf.isFreeform) {
      if (!bf.notes) return;
      setGeneratingRecipe(true);
      const generated = await generateRecipeFromBake(bf);
      setGeneratingRecipe(false);
      setRecipePreview({ ...generated, ingredients: bf.freeformIngredients.filter(i=>i.name).map((i,idx)=>({...i,id:"fi"+idx})), _pendingBake: bf });
      return;
    }
    if (!bf.recipeId||!bf.notes) return;
    if (editingBakeId) {
      setMyBakes(myBakes.map(b => b.id===editingBakeId ? {...bf, id:editingBakeId, recipeId:parseInt(bf.recipeId)} : b));
      setEditingBakeId(null);
    } else {
      setMyBakes([...myBakes,{...bf,id:Date.now(),recipeId:parseInt(bf.recipeId)}]);
    }
    setBakeForm(emptyBake()); setView("journal");
  }
  function confirmSaveFreeform(editedPreview) {
    const newRecipeId = Date.now();
    setRecipes(r=>[...r, { id:newRecipeId, name:editedPreview.name, description:editedPreview.description, hydration:editedPreview.hydration, tags:editedPreview.tags||[], author:"My bake", ingredients:editedPreview.ingredients, steps:editedPreview.steps }]);
    setMyBakes(b=>[...b, {...editedPreview._pendingBake, recipeId: newRecipeId, id: Date.now()+1}]);
    setRecipePreview(null); setBakeForm(emptyBake()); setView("journal");
  }
  function saveRecipe() {
    if (!rf.name) return;
    setRecipes([...recipes,{...rf,id:Date.now(),tags:rf.tags.split(",").map(t=>t.trim()).filter(Boolean),ingredients:rf.ingredients.filter(i=>i.name),steps:rf.steps.filter(Boolean)}]);
    setView("recipes");
  }
  function addFold() { set({ folds:[...bf.folds,emptyFold()] }); }
  function upFold(id,p) { set({ folds:bf.folds.map(f=>f.id===id?{...f,...p}:f) }); }
  function rmFold(id) { set({ folds:bf.folds.filter(f=>f.id!==id) }); }

  // ── Journal view ────────────────────────────────────────────────────────────
  if (view==="journal") {
    const displayBakes = journalTab === "mine" ? myBakes.map(b=>({...b,_prof:profile}))
      : journalTab === "theirs" ? theirBakes.map(b=>({...b,_prof:other}))
      : [...myBakes.map(b=>({...b,_prof:profile})), ...theirBakes.map(b=>({...b,_prof:other}))];
    const q = search.toLowerCase();
    const filtered = displayBakes
      .filter(bake => {
        const rec = getRecipe(bake.recipeId);
        if (filterOutcome && bake.outcome!==filterOutcome) return false;
        if (q) {
          const haystack = [rec?.name||"", bake.notes||"", bake.variantName||"", bake.location||"", bake.vessel||""].join(" ").toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        return true;
      })
      .sort((a,b)=>new Date(b.date)-new Date(a.date));

    return (
      <div style={S.app}>
        {modal && <BakeModal bake={modal} bakeProfile={modalProfile} recipe={getRecipe(modal.recipeId)} onClose={()=>setModal(null)} currentProfile={profile}/>}
        {recipePreview && <RecipePreviewModal preview={recipePreview} onConfirm={confirmSaveFreeform} onCancel={()=>setRecipePreview(null)}/>}
        {deleteConfirm && (
          <div style={{ position:"fixed", inset:0, background:"rgba(28,18,10,0.6)", zIndex:400, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
            <div style={{ background:C.paper, border:`1px solid ${C.border}`, borderRadius:6, maxWidth:360, width:"100%", padding:24, textAlign:"center" }}>
              <div style={{ fontSize:28, marginBottom:10 }}>🗑</div>
              <h3 style={{ fontStyle:"italic", fontSize:17, marginBottom:6 }}>Delete this bake?</h3>
              <p style={{ fontSize:12, color:C.muted, marginBottom:18 }}>This cannot be undone.</p>
              <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
                <button style={S.btnO} onClick={()=>setDeleteConfirm(null)}>Cancel</button>
                <button style={{ ...S.btn, background:"#7a2020" }} onClick={confirmDelete}>Delete</button>
              </div>
            </div>
          </div>
        )}
        <Nav {...navProps}/>
        <main style={S.main}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
            <h1 style={S.title}>Bake Journal</h1>
            <button style={S.btn} onClick={()=>{ setEditingBakeId(null); setBakeForm(emptyBake()); setView("newBake"); }}>+ Log a Bake</button>
          </div>

          <ActivityFeed myBakes={myBakes} theirBakes={theirBakes} recipes={recipes}/>

          {/* Toggle */}
          <div style={{ display:"flex", gap:6, marginBottom:14 }}>
            {[["mine", `${PROFILES[profile].emoji} My Bakes`], ["theirs", `${PROFILES[other].emoji} Their Bakes`], ["all","🐥🦆 All Bakes"]].map(([tab, label]) => (
              <button key={tab} onClick={()=>setJournalTab(tab)}
                style={{ background: journalTab===tab ? C.ink : "transparent", color: journalTab===tab ? "#f5e6c8" : C.muted, border:`1.5px solid ${journalTab===tab ? C.ink : C.border}`, padding:"5px 12px", borderRadius:20, cursor:"pointer", fontFamily:"monospace", fontSize:11 }}>
                {label}
              </button>
            ))}
          </div>

          {/* Search */}
          <div style={{ background:C.paper, border:`1px solid ${C.border}`, borderRadius:4, padding:"10px 14px", marginBottom:14 }}>
            <input style={{ ...S.input, marginBottom:6 }} placeholder="Search notes, recipe names…" value={search} onChange={e=>setSearch(e.target.value)}/>
            <div style={{ display:"flex", gap:8 }}>
              <div style={{ flex:1 }}>
                <label style={S.label}>Outcome</label>
                <select style={{ ...S.input, marginBottom:0 }} value={filterOutcome} onChange={e=>setFilterOutcome(e.target.value)}>
                  <option value="">All outcomes</option>
                  {Object.entries(OUTCOMES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
              {(search||filterOutcome) && <button style={{ ...S.btnSm, alignSelf:"flex-end", marginBottom:0 }} onClick={()=>{ setSearch(""); setFilterOutcome(""); }}>✕ clear</button>}
            </div>
          </div>

          <p style={{ ...S.sub, marginBottom:12 }}>{filtered.length} bake{filtered.length!==1?"s":""} {journalTab==="all"?"total":journalTab==="mine"?"by you":`by ${PROFILES[other].label}`}</p>
          {filtered.length===0 && <div style={{ ...S.card, textAlign:"center", color:C.muted, fontStyle:"italic", padding:32 }}>No bakes here yet.</div>}
          {filtered.map(bake => {
            const rec = getRecipe(bake.recipeId);
            const isMine = bake._prof === profile;
            return (
              <div key={`${bake._prof}-${bake.id}`} style={S.bakeCard(bake.isVariant, bake._prof)} onClick={()=>openModal(bake, bake._prof)}>
                <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginBottom:6 }}>
                  <div>
                    <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3, flexWrap:"wrap" }}>
                      {journalTab === "all" && <DuckBadge prof={bake._prof}/>}
                      <span style={{ fontStyle:"italic", fontSize:15, fontWeight:600 }}>{rec?.name}</span>
                      {bake.isVariant && <span style={{ background:C.blueLight, color:C.blue, padding:"1px 7px", borderRadius:20, fontSize:10, fontFamily:"monospace" }}>↪ {bake.variantName}</span>}
                    </div>
                    <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                      <Loc location={bake.location}/>
                      <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🫕 {bake.vessel}</span>
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <Badge outcome={bake.outcome}/><Stars value={bake.rating}/>
                    {isMine && <button style={{ ...S.btnSm, padding:"3px 8px", fontSize:13 }} onClick={e=>startEditBake(bake,e)}>✏️</button>}
                    {isMine && <button style={{ ...S.btnX, padding:"3px 8px", fontSize:13 }} onClick={e=>deleteBake(bake.id,e)}>🗑</button>}
                  </div>
                </div>
                <p style={{ fontSize:12, lineHeight:1.65, fontStyle:"italic", color:"#3a2a18", margin:0 }}>"{bake.notes?.slice(0,145)}{bake.notes?.length>145?"…":""}"</p>
              </div>
            );
          })}
        </main>
      </div>
    );
  }

  // ── New / Edit Bake ─────────────────────────────────────────────────────────
  if (view==="newBake") return (
    <div style={S.app}>
      {recipePreview && <RecipePreviewModal preview={recipePreview} onConfirm={confirmSaveFreeform} onCancel={()=>setRecipePreview(null)}/>}
      <Nav {...navProps}/>
      <main style={S.main}>
        <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("journal")}>← Back</button>
        <h1 style={S.title}>{editingBakeId ? "Edit Bake" : "Log a Bake"}</h1>
        <p style={S.sub}>Logging as {PROFILES[profile].emoji} {PROFILES[profile].label}</p>
        <div style={{ maxWidth:640 }}>
          <div style={S.card}>
            <div style={S.g2}>
              <div><label style={S.label}>Recipe</label>
                <select style={S.input} value={bf.isFreeform ? "freeform" : bf.recipeId}
                  onChange={e=>{
                    if (e.target.value==="freeform") set({isFreeform:true, recipeId:"", variantIngredients:[], isVariant:false, freeformIngredients:[{id:Date.now(),name:"",amount:"",unit:"g"}], freeformSteps:[""]});
                    else set({isFreeform:false, recipeId:e.target.value, variantIngredients:[], freeformIngredients:[], freeformSteps:[]});
                  }}>
                  <option value="">Select…</option>
                  {recipes.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                  <option value="freeform">✨ New freeform bake (generate recipe)</option>
                </select>
              </div>
              <div><label style={S.label}>Date</label><input type="date" style={S.input} value={bf.date} onChange={e=>set({date:e.target.value})}/></div>
            </div>

            {bf.isFreeform && (
              <div style={{ background:"#f5f0e4", border:"1px solid #d4bc88", borderRadius:4, padding:"13px 14px", marginBottom:11 }}>
                <div style={{ fontFamily:"monospace", fontSize:10, color:"#7a5a28", textTransform:"uppercase", marginBottom:10 }}>✨ Freeform bake</div>
                <div style={{ ...S.sh, marginBottom:6 }}>Ingredients</div>
                {(bf.freeformIngredients||[]).map((ing,idx)=>(
                  <div key={ing.id} style={{ display:"grid", gridTemplateColumns:"2.5fr 1fr 60px 28px", gap:5, marginBottom:5, alignItems:"center" }}>
                    <input style={{ ...S.input, marginBottom:0 }} placeholder="e.g. Red fife flour" value={ing.name} onChange={e=>set({freeformIngredients:bf.freeformIngredients.map((i,j)=>j===idx?{...i,name:e.target.value}:i)})}/>
                    <input type="number" style={{ ...S.input, marginBottom:0 }} value={ing.amount} onChange={e=>set({freeformIngredients:bf.freeformIngredients.map((i,j)=>j===idx?{...i,amount:e.target.value}:i)})}/>
                    <select style={{ ...S.input, marginBottom:0, padding:"7px 4px" }} value={ing.unit} onChange={e=>set({freeformIngredients:bf.freeformIngredients.map((i,j)=>j===idx?{...i,unit:e.target.value}:i)})}>
                      <option>g</option><option>kg</option><option>ml</option><option>tsp</option><option>tbsp</option>
                    </select>
                    <button style={{ ...S.btnX, padding:"4px 6px" }} onClick={()=>set({freeformIngredients:bf.freeformIngredients.filter((_,j)=>j!==idx)})}>✕</button>
                  </div>
                ))}
                <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>set({freeformIngredients:[...(bf.freeformIngredients||[]),{id:Date.now(),name:"",amount:"",unit:"g"}]})}>+ Ingredient</button>
                <div style={{ ...S.sh, marginBottom:6 }}>Method Notes (optional)</div>
                {(bf.freeformSteps||[]).map((step,i)=>(
                  <div key={i} style={{ display:"flex", gap:7, marginBottom:6, alignItems:"flex-start" }}>
                    <span style={{ minWidth:17, height:17, background:"#c17f2a", color:"#fff", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0, marginTop:7 }}>{i+1}</span>
                    <textarea style={{ ...S.input, marginBottom:0, resize:"vertical", minHeight:36 }} value={step} onChange={e=>set({freeformSteps:bf.freeformSteps.map((s,j)=>j===i?e.target.value:s)})}/>
                  </div>
                ))}
                <button style={S.btnSm} onClick={()=>set({freeformSteps:[...(bf.freeformSteps||[]),""]})}>+ Step</button>
              </div>
            )}

            {!bf.isFreeform && (
              <label style={{ display:"flex", alignItems:"center", gap:7, cursor:"pointer", fontSize:13, marginBottom:10 }}>
                <input type="checkbox" checked={bf.isVariant} onChange={e=>set({isVariant:e.target.checked})}/>
                This bake is a variant / uses substitutions
              </label>
            )}
            {!bf.isFreeform && bf.isVariant && (
              <div style={{ background:"#eef5f8", border:`1px solid #b8d0dc`, borderRadius:4, padding:"11px 13px", marginBottom:11 }}>
                <label style={S.label}>Variant Name</label>
                <input style={{ ...S.input, marginBottom:11 }} placeholder="e.g. Red fife + spelt blend" value={bf.variantName} onChange={e=>set({variantName:e.target.value})}/>
                {bf.recipeId
                  ? <VariantIngredientsEditor baseIngredients={recipes.find(r=>r.id===parseInt(bf.recipeId))?.ingredients||[]} variantIngredients={bf.variantIngredients||[]} onChange={vi=>set({variantIngredients:vi})}/>
                  : <div style={{ fontStyle:"italic", fontSize:12, color:C.muted }}>Select a recipe first.</div>
                }
              </div>
            )}
            <hr style={S.divider}/>
            <div style={S.g3}>
              <div><label style={S.label}>Location</label>
                <select style={S.input} value={bf.location} onChange={e=>set({location:e.target.value})}>
                  {LOCATIONS.map(l=><option key={l}>{l}</option>)}
                </select></div>
              <div><label style={S.label}>Vessel</label>
                <select style={S.input} value={bf.vessel} onChange={e=>set({vessel:e.target.value})}>
                  {VESSELS.map(v=><option key={v}>{v}</option>)}
                </select></div>
              <div><label style={S.label}>Oven Temp</label><input style={S.input} placeholder="e.g. 500F" value={bf.ovenTemp} onChange={e=>set({ovenTemp:e.target.value})}/></div>
            </div>
            <div style={S.g2}>
              <div><label style={S.label}>Bulk Ferment</label><input style={S.input} placeholder="e.g. 5 hrs" value={bf.bulkTime} onChange={e=>set({bulkTime:e.target.value})}/></div>
              <div><label style={S.label}>Cold Proof</label><input style={S.input} placeholder="e.g. 14 hrs" value={bf.proofTime} onChange={e=>set({proofTime:e.target.value})}/></div>
            </div>
            <hr style={S.divider}/>
            <div style={{ ...S.sh, marginBottom:9 }}>Folds & Dough Temp</div>
            <div style={S.g2}>
              <div><label style={S.label}>Dough Temp at Mix</label><input style={S.input} placeholder="e.g. 76F" value={bf.doughTempAtMix} onChange={e=>set({doughTempAtMix:e.target.value})}/></div>
              <div/>
            </div>
            <div style={{ background:"#f8f4ec", borderRadius:4, overflow:"hidden", marginBottom:9 }}>
              <div style={{ display:"grid", gridTemplateColumns:"2fr 2fr 1.5fr 32px", borderBottom:`1px solid ${C.border}`, padding:"5px 11px" }}>
                {["Technique","Time into Bulk","Dough Temp",""].map(h=><div key={h} style={{ ...S.label, marginBottom:0, fontSize:9 }}>{h}</div>)}
              </div>
              {bf.folds.map(fold=>(
                <div key={fold.id} style={{ display:"grid", gridTemplateColumns:"2fr 2fr 1.5fr 32px", padding:"5px 11px", borderBottom:`1px solid #f0e8d8`, alignItems:"center" }}>
                  <select style={{ ...S.input, marginBottom:0, border:"none", background:"transparent", padding:"4px 2px", fontSize:12 }} value={fold.technique} onChange={e=>upFold(fold.id,{technique:e.target.value})}>
                    {FOLD_TECHNIQUES.map(t=><option key={t}>{t}</option>)}
                  </select>
                  <input style={{ ...S.input, marginBottom:0, border:"none", background:"transparent", padding:"4px 6px", fontSize:12 }} placeholder="30 min" value={fold.interval} onChange={e=>upFold(fold.id,{interval:e.target.value})}/>
                  <input style={{ ...S.input, marginBottom:0, border:"none", background:"transparent", padding:"4px 6px", fontSize:12 }} placeholder="78F" value={fold.doughTemp} onChange={e=>upFold(fold.id,{doughTemp:e.target.value})}/>
                  <button style={{ background:"none", border:"none", color:"#b08060", cursor:"pointer", fontSize:14 }} onClick={()=>rmFold(fold.id)}>✕</button>
                </div>
              ))}
              <div style={{ padding:"6px 11px" }}>
                <button style={{ background:"none", border:"none", color:C.brown, fontFamily:"monospace", fontSize:11, cursor:"pointer" }} onClick={addFold}>+ add fold</button>
              </div>
            </div>
            <hr style={S.divider}/>
            <div style={S.sh}>Outcome</div>
            <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
              {Object.entries(OUTCOMES).map(([k,v])=>(
                <button key={k} onClick={()=>set({outcome:k})}
                  style={{ background:bf.outcome===k?v.bg:"transparent", color:bf.outcome===k?v.text:C.muted, border:`1.5px solid ${bf.outcome===k?v.bg:"#d0bc98"}`, padding:"4px 12px", borderRadius:20, cursor:"pointer", fontFamily:"monospace", fontSize:11 }}>
                  {v.label}
                </button>
              ))}
            </div>
            <label style={S.label}>Rating</label>
            <div style={{ marginBottom:10 }}><Stars value={bf.rating} onChange={v=>set({rating:v})}/></div>
            <label style={S.label}>Notes</label>
            <textarea style={{ ...S.input, minHeight:80, resize:"vertical" }} placeholder="Crumb, crust, taste, what to try next…" value={bf.notes} onChange={e=>set({notes:e.target.value})}/>
            <hr style={S.divider}/>
            <div style={S.sh}>Media (optional)</div>
            <label style={S.label}>Video URL (YouTube / Vimeo)</label>
            <input style={S.input} placeholder="https://youtu.be/…" value={bf.videoUrl} onChange={e=>set({videoUrl:e.target.value})}/>
            <label style={S.label}>Photo</label>
            {bf.photoUrl
              ? <div style={{ position:"relative", marginBottom:8 }}>
                  <img src={bf.photoUrl} alt="bake preview" style={{ width:"100%", maxHeight:200, objectFit:"cover", borderRadius:4, display:"block" }}/>
                  <button onClick={()=>set({photoUrl:""})} style={{ position:"absolute", top:6, right:6, background:"rgba(28,18,10,0.65)", color:"#f5e6c8", border:"none", borderRadius:3, padding:"3px 8px", cursor:"pointer", fontSize:11 }}>Remove</button>
                </div>
              : <label style={{ display:"block", border:"2px dashed #d0bc98", borderRadius:4, padding:18, textAlign:"center", cursor:"pointer", marginBottom:8, background:"#faf7f0" }}>
                  <div style={{ fontSize:22, marginBottom:4 }}>📷</div>
                  <div style={{ fontSize:12, color:C.muted, fontFamily:"monospace" }}>Click to upload a photo</div>
                  <input type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => set({photoUrl: ev.target.result});
                    reader.readAsDataURL(file);
                  }}/>
                </label>
            }
            {generatingRecipe
              ? <div style={{ textAlign:"center", padding:14, fontFamily:"monospace", fontSize:12, color:C.brown }}>✨ Generating recipe…</div>
              : <button style={{ ...S.btn, width:"100%", padding:12, fontSize:13, marginTop:4, opacity:((!bf.recipeId && !bf.isFreeform)||!bf.notes)?0.45:1 }}
                  onClick={saveBake} disabled={(!bf.recipeId && !bf.isFreeform)||!bf.notes}>
                  {editingBakeId ? "Update Bake" : bf.isFreeform ? "✨ Generate Recipe & Save" : "Save Bake"}
                </button>
            }
          </div>
        </div>
      </main>
    </div>
  );

  // ── Recipes ─────────────────────────────────────────────────────────────────
  if (view==="recipes") return (
    <div style={S.app}>
      <Nav {...navProps}/>
      <main style={S.main}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22 }}>
          <div><h1 style={S.title}>Recipes</h1><p style={S.sub}>{recipes.length} shared recipes</p></div>
          <button style={S.btn} onClick={()=>setView("newRecipe")}>+ New Recipe</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
          {recipes.map(r=>{
            const allBakesForRecipe = [...myBakes, ...theirBakes].filter(b=>b.recipeId===r.id);
            return (
              <div key={r.id} style={{ ...S.card, cursor:"pointer" }} onClick={()=>{ setSelRecipe(r); setScale(1); setView("recipeDetail"); }}>
                <div style={{ position:"absolute", top:0, right:0, background:C.brown, color:"#f5e6c8", padding:"3px 10px", fontSize:10, fontFamily:"monospace", borderRadius:"0 4px 0 8px" }}>{r.hydration}% hydration</div>
                <h2 style={{ fontStyle:"italic", fontSize:17, fontWeight:600, marginBottom:3, paddingRight:85 }}>{r.name}</h2>
                {r.author && <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:5 }}>by {r.author}</div>}
                <p style={{ fontSize:12, color:"#6b5040", lineHeight:1.55, marginBottom:8, fontStyle:"italic" }}>{r.description}</p>
                <div style={{ marginBottom:8 }}>{(r.tags||[]).map(t=><span key={t} style={S.tag}>{t}</span>)}</div>
                <hr style={S.divider}/>
                <div style={{ display:"flex", gap:12, fontFamily:"monospace", fontSize:10, color:C.muted, flexWrap:"wrap" }}>
                  <span>{allBakesForRecipe.length} bake{allBakesForRecipe.length!==1?"s":""} total</span>
                  {Object.entries(PROFILES).map(([pk, pv]) => {
                    const cnt = (pk===profile?myBakes:theirBakes).filter(b=>b.recipeId===r.id).length;
                    return cnt > 0 ? <span key={pk}>{pv.emoji} {cnt}</span> : null;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </main>
    </div>
  );

  // ── Recipe Detail ────────────────────────────────────────────────────────────
  if (view==="recipeDetail" && selRecipe) {
    const r = selRecipe;
    const myRb = myBakes.filter(b=>b.recipeId===r.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const theirRb = theirBakes.filter(b=>b.recipeId===r.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    return (
      <div style={S.app}>
        {modal && <BakeModal bake={modal} bakeProfile={modalProfile} recipe={r} onClose={()=>setModal(null)} currentProfile={profile}/>}
        <Nav {...navProps}/>
        <main style={S.main}>
          <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("recipes")}>← Back</button>
          <div style={S.card}>
            <div style={{ position:"absolute", top:0, right:0, background:C.brown, color:"#f5e6c8", padding:"3px 10px", fontSize:10, fontFamily:"monospace", borderRadius:"0 4px 0 8px" }}>{r.hydration}% hydration</div>
            <h1 style={{ ...S.title, marginBottom:3 }}>{r.name}</h1>
            {r.author && <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:8 }}>by {r.author}</div>}
            <p style={{ fontSize:13, fontStyle:"italic", color:"#5a4030", marginBottom:8 }}>{r.description}</p>
            <div style={{ marginBottom:4 }}>{(r.tags||[]).map(t=><span key={t} style={S.tag}>{t}</span>)}</div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <div style={S.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <h3 style={{ fontStyle:"italic", fontSize:15 }}>Ingredients</h3>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>scale:</span>
                  {[0.5,1,1.5,2].map(s=>(
                    <button key={s} onClick={()=>setScale(s)} style={{ background:scale===s?C.brown:"transparent", color:scale===s?"#f5e6c8":C.muted, border:`1px solid ${scale===s?C.brown:"#d0bc98"}`, padding:"2px 7px", borderRadius:3, cursor:"pointer", fontFamily:"monospace", fontSize:10 }}>{s}x</button>
                  ))}
                </div>
              </div>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <tbody>{r.ingredients.map(ing=>(
                  <tr key={ing.id} style={{ borderBottom:"1px solid #f5efe4" }}>
                    <td style={{ padding:"5px 0", fontSize:13 }}>{ing.name}</td>
                    <td style={{ padding:"5px 0", textAlign:"right", fontFamily:"monospace", fontSize:13, fontWeight:500, color:scale!==1?C.brown:C.ink }}>{sc(ing.amount)}{ing.unit}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={S.card}>
              <h3 style={{ fontStyle:"italic", fontSize:15, marginBottom:12 }}>Method</h3>
              <ol style={{ paddingLeft:0, listStyle:"none", margin:0 }}>
                {r.steps.map((step,i)=>(
                  <li key={i} style={{ display:"flex", gap:8, marginBottom:10 }}>
                    <span style={{ minWidth:19, height:19, background:C.ink, color:"#f5e6c8", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0 }}>{i+1}</span>
                    <span style={{ fontSize:12, lineHeight:1.65 }}>{step}</span>
                  </li>
                ))}
              </ol>
            </div>
          </div>
          {[{label:`${PROFILES[profile].emoji} ${PROFILES[profile].label}'s Bakes`, bakes:myRb, prof:profile}, {label:`${PROFILES[other].emoji} ${PROFILES[other].label}'s Bakes`, bakes:theirRb, prof:other}].map(({label, bakes, prof}) => (
            <div key={prof} style={{ marginBottom:18 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <h3 style={{ fontStyle:"italic", fontSize:16 }}>{label}</h3>
                {prof===profile && <button style={S.btnSm} onClick={()=>{ setBakeForm({...emptyBake(),recipeId:String(r.id)}); setView("newBake"); }}>+ Log a bake</button>}
              </div>
              {bakes.length === 0 && <div style={{ ...S.card, textAlign:"center", color:C.muted, fontStyle:"italic", padding:18, fontSize:12 }}>No bakes yet.</div>}
              {bakes.map(bake=>(
                <div key={bake.id} style={S.bakeCard(bake.isVariant, prof)} onClick={()=>openModal(bake, prof)}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5, flexWrap:"wrap", gap:6 }}>
                    <div style={{ display:"flex", gap:9, flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                      <Loc location={bake.location}/>
                    </div>
                    <div style={{ display:"flex", gap:6 }}><Badge outcome={bake.outcome}/><Stars value={bake.rating}/></div>
                  </div>
                  <p style={{ fontSize:12, fontStyle:"italic", margin:0 }}>{bake.notes?.slice(0,120)}{bake.notes?.length>120?"…":""}</p>
                </div>
              ))}
            </div>
          ))}
        </main>
      </div>
    );
  }

  // ── New Recipe ───────────────────────────────────────────────────────────────
  if (view==="newRecipe") return (
    <div style={S.app}>
      <Nav {...navProps}/>
      <main style={S.main}>
        <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("recipes")}>← Back</button>
        <h1 style={S.title}>New Recipe</h1>
        <div style={{ maxWidth:640 }}>
          <div style={S.card}>
            <div style={S.g2}>
              <div><label style={S.label}>Recipe Name</label><input style={S.input} placeholder="e.g. Einkorn Sourdough" value={rf.name} onChange={e=>setR({name:e.target.value})}/></div>
              <div><label style={S.label}>Author / Source</label><input style={S.input} placeholder="e.g. Tartine" value={rf.author} onChange={e=>setR({author:e.target.value})}/></div>
            </div>
            <label style={S.label}>Description</label>
            <input style={S.input} placeholder="Tasting notes…" value={rf.description} onChange={e=>setR({description:e.target.value})}/>
            <div style={S.g2}>
              <div><label style={S.label}>Hydration (%)</label><input type="number" style={S.input} value={rf.hydration} onChange={e=>setR({hydration:parseInt(e.target.value)})}/></div>
              <div><label style={S.label}>Tags (comma-separated)</label><input style={S.input} placeholder="spelt, open crumb…" value={rf.tags} onChange={e=>setR({tags:e.target.value})}/></div>
            </div>
            <hr style={S.divider}/>
            <h3 style={{ fontStyle:"italic", marginBottom:10, fontSize:14 }}>Ingredients</h3>
            {rf.ingredients.map((ing,idx)=>(
              <div key={ing.id} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 65px", gap:6, marginBottom:5 }}>
                <input style={{ ...S.input, marginBottom:0 }} placeholder="Name" value={ing.name} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,name:e.target.value}:i)})}/>
                <input type="number" style={{ ...S.input, marginBottom:0 }} placeholder="Amount" value={ing.amount} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,amount:e.target.value}:i)})}/>
                <select style={{ ...S.input, marginBottom:0 }} value={ing.unit} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,unit:e.target.value}:i)})}>
                  <option>g</option><option>kg</option><option>ml</option><option>tsp</option><option>tbsp</option>
                </select>
              </div>
            ))}
            <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>setR({ingredients:[...rf.ingredients,{id:Date.now(),name:"",amount:"",unit:"g"}]})}>+ Ingredient</button>
            <hr style={S.divider}/>
            <h3 style={{ fontStyle:"italic", marginBottom:10, fontSize:14 }}>Method</h3>
            {rf.steps.map((step,i)=>(
              <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"flex-start" }}>
                <span style={{ minWidth:19, height:19, background:"#e8dcc8", color:"#5a3e28", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0, marginTop:7 }}>{i+1}</span>
                <textarea style={{ ...S.input, marginBottom:0, resize:"vertical", minHeight:40 }} placeholder={`Step ${i+1}…`} value={step} onChange={e=>setR({steps:rf.steps.map((s,j)=>j===i?e.target.value:s)})}/>
              </div>
            ))}
            <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>setR({steps:[...rf.steps,""]})}>+ Step</button>
            <button style={{ ...S.btn, width:"100%", padding:11, fontSize:13, opacity:!rf.name?0.45:1 }} onClick={saveRecipe} disabled={!rf.name}>Save Recipe</button>
          </div>
        </div>
      </main>
    </div>
  );

  // ── Pantry ───────────────────────────────────────────────────────────────────
  if (view==="pantry") return (
    <div style={S.app}>
      <Nav {...navProps}/>
      <main style={S.main}><FlourPantry flours={flours} setFlours={setFlours}/></main>
    </div>
  );

  // ── Stats ────────────────────────────────────────────────────────────────────
  if (view==="stats") return (
    <div style={S.app}>
      <Nav {...navProps}/>
      <main style={S.main}><StatsView myBakes={myBakes} theirBakes={theirBakes} recipes={recipes} myProfile={profile}/></main>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

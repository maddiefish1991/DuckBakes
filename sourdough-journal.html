// ── localStorage persistence ──────────────────────────────────────────────────
function lsSave(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
function lsLoad(key, fallback) { try { const v = localStorage.getItem(key); if (v) return JSON.parse(v); } catch(e) {} return fallback; }

function getYouTubeId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function getVimeoId(url) {
  const m = url.match(/vimeo\.com\/(\d+)/);
  return m ? m[1] : null;
}

const C = {
  cream:"#f5f0e8", paper:"#fffdf7", ink:"#1c120a", brown:"#8b5e3c",
  muted:"#8b6a50", border:"#e0d4b8", tag:"#e8dcc8", tagText:"#5a3e28",
  gold:"#c17f2a", blue:"#5a7a8a", blueLight:"#d8eaf2",
};
const S = {
  app:    { minHeight:"100vh", background:C.cream, fontFamily:"Georgia,serif", color:C.ink },
  header: { background:C.ink, padding:"0 20px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:`3px solid ${C.brown}`, position:"sticky", top:0, zIndex:100 },

  navBtn: a => ({ background:a?C.brown:"transparent", color:a?"#f5e6c8":"#b89878", border:"none", padding:"7px 13px", borderRadius:4, cursor:"pointer", fontSize:12, fontFamily:"Georgia,serif" }),

  card:   { background:C.paper, border:`1px solid ${C.border}`, borderRadius:4, padding:18, marginBottom:12, boxShadow:"0 2px 6px rgba(44,31,14,.05)", position:"relative" },

  btnSm:  { background:"transparent", color:C.brown, border:`1px solid ${C.brown}`, padding:"3px 10px", borderRadius:3, cursor:"pointer", fontSize:11, fontFamily:"monospace" },
  btnX:   { background:"transparent", color:"#9a3030", border:"1px solid #c07070", padding:"4px 8px", borderRadius:3, cursor:"pointer", fontSize:11 },
  input:  { width:"100%", padding:"7px 11px", border:`1px solid #d0bc98`, borderRadius:3, fontFamily:"Georgia,serif", fontSize:13, background:"#faf7f0", color:C.ink, boxSizing:"border-box", marginBottom:8 },
  label:  { display:"block", fontSize:10, fontFamily:"monospace", color:C.muted, marginBottom:2, letterSpacing:"0.8px", textTransform:"uppercase" },
  tag:    { display:"inline-block", background:C.tag, color:C.tagText, padding:"2px 8px", borderRadius:20, fontSize:10, marginRight:4, fontFamily:"monospace" },

  sh:     { fontFamily:"monospace", fontSize:10, color:C.muted, letterSpacing:"0.8px", textTransform:"uppercase", marginBottom:8 },
  g2:     { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 },
  g3:     { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 },

function Nav({ view, setView, saved }) {
  const onJ = ["journal","newBake"].includes(view);
  const onR = ["recipes","recipeDetail","newRecipe"].includes(view);
  const onP = view==="pantry";
  return (
    <header style={S.header}>
      <div style={{ display:"flex", alignItems:"center", gap:14 }}>
        <div style={S.logo}>🌾 Sourdough Journal</div>
        {saved && <span style={{ fontFamily:"monospace", fontSize:10, color:"#6a9a6a" }}>✓ saved</span>}
      </div>
      <nav style={{ display:"flex", gap:3 }}>
        <button style={S.navBtn(onJ)} onClick={()=>setView("journal")}>Journal</button>
        <button style={S.navBtn(onR)} onClick={()=>setView("recipes")}>Recipes</button>
        <button style={S.navBtn(onP)} onClick={()=>setView("pantry")}>Flour Pantry</button>
      </nav>
    </header>
  );
}

function Stars({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:2 }}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} onClick={()=>onChange?.(s)}
          style={{ fontSize:19, cursor:onChange?"pointer":"default", color:s<=value?C.gold:"#d0bc98", lineHeight:1 }}>★</span>
      ))}
    </div>
  );
}
function Badge({ outcome }) {
  const c = OUTCOMES[outcome]||OUTCOMES.okay;
  return <span style={{ background:c.bg, color:c.text, padding:"2px 9px", borderRadius:20, fontSize:10, fontFamily:"monospace" }}>{c.label}</span>;
}
function Loc({ location }) {
  return <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{location==="Home"?"🏠":location==="Work"?"🏢":"📍"} {location}</span>;
}
function VideoEmbed({ url }) {
  if (!url) return null;
  const yt = getYouTubeId(url), vm = getVimeoId(url);
  if (yt) return <div style={{ marginTop:10, borderRadius:4, overflow:"hidden", aspectRatio:"16/9" }}><iframe width="100%" height="100%" src={`https://www.youtube.com/embed/${yt}`} frameBorder="0" allowFullScreen style={{ display:"block" }}/></div>;
  if (vm) return <div style={{ marginTop:10, borderRadius:4, overflow:"hidden", aspectRatio:"16/9" }}><iframe width="100%" height="100%" src={`https://player.vimeo.com/video/${vm}`} frameBorder="0" allowFullScreen style={{ display:"block" }}/></div>;
  return <div style={{ marginTop:8, padding:"6px 10px", background:"#f0e8d8", borderRadius:3, fontSize:11, fontFamily:"monospace", color:C.muted }}>📹 Video attached</div>;
}

function FoldsTable({ folds, doughTempAtMix }) {
  if (!folds?.length && !doughTempAtMix) return null;
  return (
    <div>
      <div style={{ ...S.sh, marginBottom:6 }}>Folds & Dough Temp</div>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
        <thead>
          <tr style={{ borderBottom:`1px solid ${C.border}` }}>
            {["#","Technique","Time into Bulk","Dough Temp"].map((h,i)=>(
              <th key={h} style={{ textAlign:i===3?"right":"left", padding:"3px 6px 3px 0", fontFamily:"monospace", fontSize:9, color:C.muted, fontWeight:400 }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {doughTempAtMix && (
            <tr style={{ borderBottom:"1px solid #f5efe4" }}>
              <td style={{ padding:"4px 6px 4px 0", color:C.muted, fontFamily:"monospace", fontSize:10 }}>—</td>
              <td style={{ padding:"4px 6px 4px 0", fontStyle:"italic", color:C.muted }}>At mix</td>
              <td style={{ padding:"4px 6px 4px 0", color:C.muted, fontFamily:"monospace" }}>0 min</td>
              <td style={{ padding:"4px 0", textAlign:"right", fontFamily:"monospace", fontWeight:500 }}>{doughTempAtMix}</td>
            </tr>
          )}
          {folds.map((f,i)=>(
            <tr key={f.id} style={{ borderBottom:"1px solid #f5efe4" }}>
              <td style={{ padding:"4px 6px 4px 0", fontFamily:"monospace", fontSize:10, color:C.muted }}>{i+1}</td>
              <td style={{ padding:"4px 6px 4px 0" }}>{f.technique}</td>
              <td style={{ padding:"4px 6px 4px 0", fontFamily:"monospace", color:C.muted }}>{f.interval}</td>
              <td style={{ padding:"4px 0", textAlign:"right", fontFamily:"monospace", fontWeight:500, color:f.doughTemp?C.brown:C.muted }}>{f.doughTemp||"—"}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function BakeModal({ bake, recipe, onClose }) {
  if (!bake) return null;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(28,18,10,0.65)", zIndex:300, display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"28px 16px", overflowY:"auto" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:C.paper, border:`1px solid ${C.border}`, borderRadius:6, maxWidth:620, width:"100%", padding:26, position:"relative", boxShadow:"0 8px 40px rgba(0,0,0,0.35)", marginBottom:28 }}>
        <button onClick={onClose} style={{ position:"absolute", top:13, right:15, background:"none", border:"none", fontSize:19, cursor:"pointer", color:C.muted }}>✕</button>
        <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:4 }}>
          {new Date(bake.date).toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
        </div>
        <h2 style={{ ...S.title, fontSize:20, marginBottom:4 }}>{recipe?.name}</h2>
        {bake.isVariant && (
          <div style={{ background:"#eef5f8", border:`1px solid #b0c8d8`, borderRadius:3, padding:"7px 12px", marginBottom:10 }}>
            <span style={{ fontFamily:"monospace", fontSize:10, color:C.blue, letterSpacing:"0.8px", textTransform:"uppercase" }}>Variant · </span>
            <strong style={{ fontStyle:"italic" }}>{bake.variantName}</strong>
            {bake.substitutions && <p style={{ margin:"3px 0 0", fontSize:12, color:"#4a6a78", fontStyle:"italic" }}>{bake.substitutions}</p>}
          </div>
        )}
        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:12, flexWrap:"wrap" }}>
          <Badge outcome={bake.outcome}/><Stars value={bake.rating}/><Loc location={bake.location}/>
          <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🫕 {bake.vessel}</span>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7, marginBottom:12 }}>
          {[["🌡 Room","roomTemp"],["🔥 Oven","ovenTemp"],["⏰ Preheat","preheatTime"],
            ["⏱ Bulk","bulkTime"],["❄️ Proof","proofTime"],["🫧 Starter Peak","starterPeak"]].map(([lbl,k])=>bake[k]?(
            <div key={k} style={{ background:"#f5f0e8", borderRadius:3, padding:"6px 8px" }}>
              <div style={{ fontFamily:"monospace", fontSize:9, color:C.muted, marginBottom:1 }}>{lbl}</div>
              <div style={{ fontSize:12, fontWeight:500 }}>{bake[k]}</div>
            </div>
          ):null)}
        </div>
        {(bake.folds?.length>0||bake.doughTempAtMix) && (
          <div style={{ background:"#f8f4ec", border:`1px solid ${C.border}`, borderRadius:4, padding:"11px 13px", marginBottom:12 }}>
            <FoldsTable folds={bake.folds} doughTempAtMix={bake.doughTempAtMix}/>
          </div>
        )}
        {bake.notes && <p style={{ fontSize:13, lineHeight:1.8, fontStyle:"italic", color:"#3a2a18", marginBottom:9 }}>"{bake.notes}"</p>}
        {bake.photoUrl && <img src={bake.photoUrl} alt="bake" style={{ width:"100%", borderRadius:4, marginBottom:8, maxHeight:240, objectFit:"cover" }}/>}
        <VideoEmbed url={bake.videoUrl}/>
      </div>
    </div>
  );
}

function FlourPantry({ flours, setFlours }) {
  const [editing, setEditing] = useState(null);
  const ef = () => ({ id:Date.now(), name:"", brand:"", protein:"", type:"White Bread", absorption:"Medium", notes:"" });
  const [form, setForm] = useState(ef());
  const sorted = [...flours].sort((a,b)=>(b.protein||0)-(a.protein||0));
  function save() {
    if (!form.name) return;
    if (editing==="new") setFlours(f=>[...f,{...form,id:Date.now()}]);
    else setFlours(f=>f.map(x=>x.id===editing?form:x));
    setEditing(null);
  }
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22 }}>
        <div><h1 style={S.title}>Flour Pantry</h1><p style={S.sub}>{flours.length} flours · sorted by protein %</p></div>
        <button style={S.btn} onClick={()=>{ setForm(ef()); setEditing("new"); }}>+ Add Flour</button>
      </div>
      <div style={{ ...S.card, marginBottom:18 }}>
        <div style={{ ...S.sh, marginBottom:11 }}>Protein % comparison</div>
        <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
          {sorted.map(f=>(
            <div key={f.id} style={{ display:"flex", alignItems:"center", gap:9 }}>
              <div style={{ width:160, fontSize:12, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", flexShrink:0 }}>{f.name}</div>
              <div style={{ flex:1, background:"#f0e8d8", borderRadius:20, height:15, overflow:"hidden" }}>
                <div style={{ width:`${Math.min(100,(f.protein||0)/20*100)}%`, background:FLOUR_TYPE_COLORS[f.type]||"#e8d4a0", height:"100%", borderRadius:20, border:"1px solid rgba(0,0,0,0.08)", minWidth:4 }}/>
              </div>
              <div style={{ width:38, textAlign:"right", fontFamily:"monospace", fontSize:12, fontWeight:600, color:C.brown }}>{f.protein?`${f.protein}%`:"—"}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop:10, display:"flex", gap:9, flexWrap:"wrap" }}>
          {Object.entries(FLOUR_TYPE_COLORS).map(([type,color])=>
            flours.some(f=>f.type===type)?(
              <div key={type} style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, fontFamily:"monospace", color:C.muted }}>
                <div style={{ width:8, height:8, borderRadius:2, background:color, border:"1px solid rgba(0,0,0,0.1)" }}/>
                {type}
              </div>
            ):null
          )}
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:12 }}>
        {sorted.map(f=>(
          <div key={f.id} style={{ ...S.card, borderTop:`3px solid ${FLOUR_TYPE_COLORS[f.type]||"#e8d4a0"}`, padding:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div style={{ flex:1, paddingRight:7 }}>
                <div style={{ fontSize:14, fontWeight:600, fontStyle:"italic", marginBottom:2 }}>{f.name}</div>
                {f.brand && <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:6 }}>{f.brand}</div>}
              </div>
              <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                <button style={S.btnSm} onClick={()=>{ setForm({...f}); setEditing(f.id); }}>Edit</button>
                <button style={S.btnX} onClick={()=>setFlours(fl=>fl.filter(x=>x.id!==f.id))}>✕</button>
              </div>
            </div>
            <div style={{ display:"flex", gap:5, marginBottom:9, flexWrap:"wrap" }}>
              <span style={{ ...S.tag, background:FLOUR_TYPE_COLORS[f.type]||C.tag }}>{f.type}</span>
              {f.protein && <span style={{ ...S.tag, background:"#f5e6c8", fontWeight:600 }}>{f.protein}% protein</span>}
              {f.absorption && <span style={{ ...S.tag, background:ABSORPTION_COLOR[f.absorption]||C.tag }}>Absorption: {f.absorption}</span>}
            </div>
            {f.notes && <p style={{ fontSize:12, lineHeight:1.65, color:"#4a3a28", fontStyle:"italic", margin:0 }}>{f.notes}</p>}
          </div>
        ))}
      </div>
      {editing!==null && (
        <div style={{ position:"fixed", inset:0, background:"rgba(28,18,10,0.6)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:C.paper, border:`1px solid ${C.border}`, borderRadius:6, maxWidth:480, width:"100%", padding:24, boxShadow:"0 8px 40px rgba(0,0,0,0.3)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <h3 style={{ fontStyle:"italic", fontSize:18 }}>{editing==="new"?"Add Flour":"Edit Flour"}</h3>
              <button onClick={()=>setEditing(null)} style={{ background:"none", border:"none", fontSize:18, cursor:"pointer", color:C.muted }}>✕</button>
            </div>
            <div style={S.g2}>
              <div><label style={S.label}>Name</label><input style={S.input} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="King Arthur Bread Flour"/></div>
              <div><label style={S.label}>Brand</label><input style={S.input} value={form.brand} onChange={e=>setForm(f=>({...f,brand:e.target.value}))} placeholder="Bob's Red Mill"/></div>
            </div>
            <div style={S.g3}>
              <div><label style={S.label}>Protein %</label><input type="number" step="0.1" style={S.input} value={form.protein} onChange={e=>setForm(f=>({...f,protein:e.target.value}))} placeholder="12.7"/></div>
              <div><label style={S.label}>Type</label>
                <select style={S.input} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                  {Object.keys(FLOUR_TYPE_COLORS).map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div><label style={S.label}>Absorption</label>
                <select style={S.input} value={form.absorption} onChange={e=>setForm(f=>({...f,absorption:e.target.value}))}>
                  {["Low","Medium","High","Very High"].map(a=><option key={a}>{a}</option>)}
                </select>
              </div>
            </div>
            <label style={S.label}>Baking Notes</label>
            <textarea style={{ ...S.input, minHeight:85, resize:"vertical" }} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="How does this flour behave in sourdough?"/>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button style={S.btnO} onClick={()=>setEditing(null)}>Cancel</button>
              <button style={{ ...S.btn, opacity:!form.name?0.5:1 }} onClick={save} disabled={!form.name}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState("journal");
  const [recipes, setRecipes] = useState(() => lsLoad("sd:recipes", BASE_RECIPES));
  const [bakes, setBakes]     = useState(() => lsLoad("sd:bakes",   SAMPLE_BAKES));
  const [flours, setFlours]   = useState(() => lsLoad("sd:flours",  DEFAULT_FLOURS));
  const [selRecipe, setSelRecipe] = useState(null);
  const [scale, setScale] = useState(1);
  const [bf, setBakeForm] = useState(emptyBake());
  const [rf, setRecipeForm] = useState({ name:"", author:"", description:"", hydration:75, tags:"", ingredients:[{id:Date.now(),name:"",amount:"",unit:"g"}], steps:[""] });
  const [modal, setModal] = useState(null);
  const [saved, setSaved] = useState(false);

  // Auto-save to localStorage whenever data changes
  useEffect(() => { lsSave("sd:recipes", recipes); flashSaved(); }, [recipes]);
  useEffect(() => { lsSave("sd:bakes",   bakes);   flashSaved(); }, [bakes]);
  useEffect(() => { lsSave("sd:flours",  flours);  flashSaved(); }, [flours]);

  function flashSaved() { setSaved(true); setTimeout(()=>setSaved(false), 2000); }

  const set = patch => setBakeForm(p=>({...p,...patch}));
  const setR = patch => setRecipeForm(p=>({...p,...patch}));
  const sorted = [...bakes].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const getRecipe = id => recipes.find(r=>r.id===id);
  const sc = n => { const v=n*scale; return v%1===0?v:v.toFixed(1); };

  function saveBake() {
    if (!bf.recipeId||!bf.notes) return;
    setBakes([...bakes,{...bf,id:Date.now(),recipeId:parseInt(bf.recipeId)}]);
    setBakeForm(emptyBake()); setView("journal");
  }
  function saveRecipe() {
    if (!rf.name) return;
    setRecipes([...recipes,{...rf,id:Date.now(),tags:rf.tags.split(",").map(t=>t.trim()).filter(Boolean),ingredients:rf.ingredients.filter(i=>i.name),steps:rf.steps.filter(Boolean)}]);
    setView("recipes");
  }
  function addFold() { set({ folds:[...bf.folds,emptyFold()] }); }
  function upFold(id,p) { set({ folds:bf.folds.map(f=>f.id===id?{...f,...p}:f) }); }
  function rmFold(id) { set({ folds:bf.folds.filter(f=>f.id!==id) }); }

  if (view==="journal") return (
    <div style={S.app}>
      {modal && <BakeModal bake={modal} recipe={getRecipe(modal.recipeId)} onClose={()=>setModal(null)}/>}
      <Nav view={view} setView={setView} saved={saved}/>
      <main style={S.main}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22 }}>
          <div><h1 style={S.title}>Bake Journal</h1><p style={S.sub}>{bakes.length} bakes recorded</p></div>
          <button style={S.btn} onClick={()=>setView("newBake")}>+ Log a Bake</button>
        </div>
        {sorted.map(bake=>{
          const rec = getRecipe(bake.recipeId);
          return (
            <div key={bake.id} style={S.bakeCard(bake.isVariant)} onClick={()=>setModal(bake)}>
              <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginBottom:6 }}>
                <div>
                  <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3 }}>
                    <span style={{ fontStyle:"italic", fontSize:15, fontWeight:600 }}>{rec?.name}</span>
                    {bake.isVariant && <span style={{ background:C.blueLight, color:C.blue, padding:"1px 7px", borderRadius:20, fontSize:10, fontFamily:"monospace" }}>↪ {bake.variantName}</span>}
                  </div>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                    <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                    <Loc location={bake.location}/>
                    <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🫕 {bake.vessel}</span>
                    {bake.folds?.length>0 && <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>✋ {bake.folds.length} folds</span>}
                    {bake.doughTempAtMix && <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🌡 {bake.doughTempAtMix} at mix</span>}
                  </div>
                </div>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  {bake.videoUrl && <span style={{ fontSize:12 }}>🎬</span>}
                  {bake.photoUrl && <span style={{ fontSize:12 }}>📸</span>}
                  <Badge outcome={bake.outcome}/><Stars value={bake.rating}/>
                </div>
              </div>
              <p style={{ fontSize:12, lineHeight:1.65, fontStyle:"italic", color:"#3a2a18", margin:0 }}>"{bake.notes.slice(0,145)}{bake.notes.length>145?"…":""}"</p>
            </div>
          );
        })}
      </main>
    </div>
  );

  if (view==="newBake") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved}/>
      <main style={S.main}>
        <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("journal")}>← Back</button>
        <h1 style={S.title}>Log a Bake</h1>
        <p style={S.sub}>Record while the memory is fresh</p>
        <div style={{ maxWidth:640 }}>
          <div style={S.card}>
            <div style={S.g2}>
              <div><label style={S.label}>Recipe</label>
                <select style={S.input} value={bf.recipeId} onChange={e=>set({recipeId:e.target.value})}>
                  <option value="">Select…</option>
                  {recipes.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                </select></div>
              <div><label style={S.label}>Date</label><input type="date" style={S.input} value={bf.date} onChange={e=>set({date:e.target.value})}/></div>
            </div>
            <label style={{ display:"flex", alignItems:"center", gap:7, cursor:"pointer", fontSize:13, marginBottom:10 }}>
              <input type="checkbox" checked={bf.isVariant} onChange={e=>set({isVariant:e.target.checked})} style={{ accentColor:C.brown }}/>
              This bake is a variant / uses substitutions
            </label>
            {bf.isVariant && (
              <div style={{ background:"#eef5f8", border:`1px solid #b0c8d8`, borderRadius:4, padding:"11px 13px", marginBottom:11 }}>
                <label style={S.label}>Variant Name</label>
                <input style={S.input} placeholder="e.g. Spelt + Einkorn sub" value={bf.variantName} onChange={e=>set({variantName:e.target.value})}/>
                <label style={S.label}>What changed?</label>
                <textarea style={{ ...S.input, minHeight:55, resize:"vertical", marginBottom:0 }} value={bf.substitutions} onChange={e=>set({substitutions:e.target.value})} placeholder="Describe your substitutions…"/>
              </div>
            )}
            <hr style={S.divider}/>
            <div style={S.sh}>Environment</div>
            <div style={S.g2}>
              <div><label style={S.label}>Location</label>
                <select style={S.input} value={bf.location} onChange={e=>set({location:e.target.value})}>
                  {LOCATIONS.map(l=><option key={l}>{l}</option>)}
                </select></div>
              <div><label style={S.label}>Room Temp</label><input style={S.input} placeholder="e.g. 72°F" value={bf.roomTemp} onChange={e=>set({roomTemp:e.target.value})}/></div>
            </div>
            <div style={S.g2}>
              <div><label style={S.label}>Vessel</label>
                <select style={S.input} value={bf.vessel} onChange={e=>set({vessel:e.target.value})}>
                  {VESSELS.map(v=><option key={v}>{v}</option>)}
                </select></div>
              <div><label style={S.label}>Oven Temp</label><input style={S.input} placeholder="e.g. 500°F" value={bf.ovenTemp} onChange={e=>set({ovenTemp:e.target.value})}/></div>
            </div>
            <div style={S.g2}>
              <div><label style={S.label}>Preheat Time</label><input style={S.input} placeholder="e.g. 60 min" value={bf.preheatTime} onChange={e=>set({preheatTime:e.target.value})}/></div>
              <div><label style={S.label}>Bulk Ferment</label><input style={S.input} placeholder="e.g. 5 hrs" value={bf.bulkTime} onChange={e=>set({bulkTime:e.target.value})}/></div>
            </div>
            <div style={S.g2}>
              <div><label style={S.label}>Cold Proof</label><input style={S.input} placeholder="e.g. 14 hrs" value={bf.proofTime} onChange={e=>set({proofTime:e.target.value})}/></div>
              <div/>
            </div>
            <hr style={S.divider}/>
            <div style={S.sh}>Starter</div>
            <div style={S.g2}>
              <div><label style={S.label}>Starter Hydration</label><input style={S.input} placeholder="e.g. 100%" value={bf.starterHydration} onChange={e=>set({starterHydration:e.target.value})}/></div>
              <div><label style={S.label}>Time to Peak</label><input style={S.input} placeholder="e.g. 4 hrs" value={bf.starterPeak} onChange={e=>set({starterPeak:e.target.value})}/></div>
            </div>
            <hr style={S.divider}/>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:9 }}>
              <div style={S.sh}>Folds & Dough Temp</div>
              <button style={S.btnSm} onClick={addFold}>+ Add Fold</button>
            </div>
            <div style={S.g2}>
              <div><label style={S.label}>Dough Temp at Mix</label><input style={S.input} placeholder="e.g. 76°F" value={bf.doughTempAtMix} onChange={e=>set({doughTempAtMix:e.target.value})}/></div>
              <div/>
            </div>
            {bf.folds.length>0 && (
              <div style={{ background:"#f8f4ec", borderRadius:4, padding:"11px 13px", marginBottom:9 }}>
                {bf.folds.map((fold,i)=>(
                  <div key={fold.id} style={{ display:"grid", gridTemplateColumns:"2fr 2fr 1.5fr auto", gap:7, marginBottom:i<bf.folds.length-1?7:0, alignItems:"end" }}>
                    <div>
                      {i===0 && <label style={S.label}>Technique</label>}
                      <select style={{ ...S.input, marginBottom:0 }} value={fold.technique} onChange={e=>upFold(fold.id,{technique:e.target.value})}>
                        {FOLD_TECHNIQUES.map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                    <div>
                      {i===0 && <label style={S.label}>Time into Bulk</label>}
                      <input style={{ ...S.input, marginBottom:0 }} placeholder="e.g. 30 min" value={fold.interval} onChange={e=>upFold(fold.id,{interval:e.target.value})}/>
                    </div>
                    <div>
                      {i===0 && <label style={S.label}>Dough Temp</label>}
                      <input style={{ ...S.input, marginBottom:0 }} placeholder="e.g. 78°F" value={fold.doughTemp} onChange={e=>upFold(fold.id,{doughTemp:e.target.value})}/>
                    </div>
                    <div style={{ paddingBottom:1 }}>
                      {i===0 && <div style={{ height:15 }}/>}
                      <button style={{ ...S.btnX, padding:"6px 8px" }} onClick={()=>rmFold(fold.id)}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <hr style={S.divider}/>
            <div style={S.sh}>Outcome</div>
            <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
              {Object.entries(OUTCOMES).map(([k,v])=>(
                <button key={k} onClick={()=>set({outcome:k})}
                  style={{ background:bf.outcome===k?v.bg:"transparent", color:bf.outcome===k?v.text:C.muted, border:`1.5px solid ${bf.outcome===k?v.bg:"#d0bc98"}`, padding:"4px 12px", borderRadius:20, cursor:"pointer", fontFamily:"monospace", fontSize:11 }}>
                  {v.label}
                </button>
              ))}
            </div>
            <label style={S.label}>Rating</label>
            <div style={{ marginBottom:10 }}><Stars value={bf.rating} onChange={v=>set({rating:v})}/></div>
            <label style={S.label}>Notes</label>
            <textarea style={{ ...S.input, minHeight:80, resize:"vertical" }} placeholder="Crumb, crust, taste, what to try next…" value={bf.notes} onChange={e=>set({notes:e.target.value})}/>
            <hr style={S.divider}/>
            <div style={S.sh}>Media (optional)</div>
            <label style={S.label}>Video URL (YouTube / Vimeo)</label>
            <input style={S.input} placeholder="https://youtu.be/…" value={bf.videoUrl} onChange={e=>set({videoUrl:e.target.value})}/>
            <label style={S.label}>Photo URL</label>
            <input style={S.input} placeholder="https://…" value={bf.photoUrl} onChange={e=>set({photoUrl:e.target.value})}/>
            <button style={{ ...S.btn, width:"100%", padding:12, fontSize:13, marginTop:4, opacity:(!bf.recipeId||!bf.notes)?0.45:1 }} onClick={saveBake} disabled={!bf.recipeId||!bf.notes}>Save Bake</button>
          </div>
        </div>
      </main>
    </div>
  );

  if (view==="recipes") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved}/>
      <main style={S.main}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22 }}>
          <div><h1 style={S.title}>Recipes</h1><p style={S.sub}>{recipes.length} base formulas</p></div>
          <button style={S.btn} onClick={()=>setView("newRecipe")}>+ New Recipe</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
          {recipes.map(r=>{
            const rb=bakes.filter(b=>b.recipeId===r.id);
            return (
              <div key={r.id} style={{ ...S.card, cursor:"pointer" }} onClick={()=>{ setSelRecipe(r); setScale(1); setView("recipeDetail"); }}>
                <div style={{ position:"absolute", top:0, right:0, background:C.brown, color:"#f5e6c8", padding:"3px 10px", fontSize:10, fontFamily:"monospace", borderRadius:"0 4px 0 8px" }}>{r.hydration}% hydration</div>
                <h2 style={{ fontStyle:"italic", fontSize:17, fontWeight:600, marginBottom:3, paddingRight:85 }}>{r.name}</h2>
                {r.author && <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:5 }}>by {r.author}</div>}
                <p style={{ fontSize:12, color:"#6b5040", lineHeight:1.55, marginBottom:8, fontStyle:"italic" }}>{r.description}</p>
                <div style={{ marginBottom:8 }}>{(r.tags||[]).map(t=><span key={t} style={S.tag}>{t}</span>)}</div>
                <hr style={S.divider}/>
                <div style={{ display:"flex", gap:12, fontFamily:"monospace", fontSize:10, color:C.muted }}>
                  <span>{rb.length} bake{rb.length!==1?"s":""}</span>
                  <span>{rb.filter(b=>b.isVariant).length} variant{rb.filter(b=>b.isVariant).length!==1?"s":""}</span>
                  {rb.length>0 && <span>avg {(rb.reduce((s,b)=>s+b.rating,0)/rb.length).toFixed(1)}★</span>}
                </div>
              </div>
            );
          })}
        </div>
      </main>
    </div>
  );

  if (view==="recipeDetail" && selRecipe) {
    const r=selRecipe;
    const rb=bakes.filter(b=>b.recipeId===r.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const canon=rb.filter(b=>!b.isVariant), vars=rb.filter(b=>b.isVariant);
    return (
      <div style={S.app}>
        {modal && <BakeModal bake={modal} recipe={r} onClose={()=>setModal(null)}/>}
        <Nav view={view} setView={setView} saved={saved}/>
        <main style={S.main}>
          <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("recipes")}>← Back</button>
          <div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
              <div>
                <h1 style={{ ...S.title, marginBottom:3 }}>{r.name}</h1>
                {r.author && <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:5 }}>by {r.author}</div>}
                <p style={{ fontStyle:"italic", color:"#6b5040", fontSize:13, marginBottom:8 }}>{r.description}</p>
                <div>{(r.tags||[]).map(t=><span key={t} style={S.tag}>{t}</span>)}</div>
              </div>
              <div style={{ textAlign:"center", background:C.ink, color:"#f5e6c8", padding:"10px 16px", borderRadius:4 }}>
                <div style={{ fontFamily:"monospace", fontSize:22 }}>{r.hydration}%</div>
                <div style={{ fontFamily:"monospace", fontSize:9, color:"#b89878" }}>HYDRATION</div>
              </div>
            </div>
          </div>
          <div style={S.g2}>
            <div style={S.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <h3 style={{ fontStyle:"italic", fontSize:15 }}>Ingredients</h3>
                <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>scale ×</span>
                  <input type="number" min="0.25" max="10" step="0.25" value={scale} onChange={e=>setScale(parseFloat(e.target.value)||1)}
                    style={{ width:54, padding:"3px 6px", border:`1.5px solid ${C.brown}`, borderRadius:3, fontFamily:"monospace", fontSize:14, textAlign:"center", background:"#faf7f0" }}/>
                </div>
              </div>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <tbody>{r.ingredients.map(ing=>(
                  <tr key={ing.id} style={{ borderBottom:"1px solid #f0e8d4" }}>
                    <td style={{ padding:"5px 0", fontSize:13 }}>{ing.name}</td>
                    <td style={{ padding:"5px 0", textAlign:"right", fontFamily:"monospace", fontSize:13, fontWeight:500, color:scale!==1?C.brown:C.ink }}>{sc(ing.amount)}{ing.unit}</td>
                  </tr>
                ))}</tbody>
              </table>
              {scale!==1 && <div style={{ marginTop:8, padding:"5px 9px", background:"#f5e6c8", borderRadius:3, fontFamily:"monospace", fontSize:10, color:C.brown }}>Scaled ×{scale}</div>}
            </div>
            <div style={S.card}>
              <h3 style={{ fontStyle:"italic", fontSize:15, marginBottom:12 }}>Method</h3>
              <ol style={{ paddingLeft:0, listStyle:"none", margin:0 }}>
                {r.steps.map((step,i)=>(
                  <li key={i} style={{ display:"flex", gap:8, marginBottom:10 }}>
                    <span style={{ minWidth:19, height:19, background:C.ink, color:"#f5e6c8", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0 }}>{i+1}</span>
                    <span style={{ fontSize:12, lineHeight:1.65 }}>{step}</span>
                  </li>
                ))}
              </ol>
            </div>
          </div>
          <div style={{ marginTop:4 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <h3 style={{ fontStyle:"italic", fontSize:18 }}>Bake History</h3>
              <button style={S.btnSm} onClick={()=>{ setBakeForm({...emptyBake(),recipeId:String(r.id)}); setView("newBake"); }}>+ Log a bake</button>
            </div>
            {rb.length===0 && <div style={{ ...S.card, textAlign:"center", color:C.muted, fontStyle:"italic", padding:26 }}>No bakes logged yet.</div>}
            {canon.length>0 && <>
              <div style={{ ...S.sh, marginBottom:6 }}>Base Recipe Bakes</div>
              {canon.map(bake=>(
                <div key={bake.id} style={S.bakeCard(false)} onClick={()=>setModal(bake)}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5, flexWrap:"wrap", gap:6 }}>
                    <div style={{ display:"flex", gap:9, flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                      <Loc location={bake.location}/><span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🫕 {bake.vessel}</span>
                      {bake.folds?.length>0 && <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>✋ {bake.folds.length} folds</span>}
                    </div>
                    <div style={{ display:"flex", gap:6 }}><Badge outcome={bake.outcome}/><Stars value={bake.rating}/></div>
                  </div>
                  <p style={{ fontSize:12, fontStyle:"italic", margin:0 }}>{bake.notes.slice(0,120)}{bake.notes.length>120?"…":""}</p>
                </div>
              ))}
            </>}
            {vars.length>0 && <>
              <div style={{ ...S.sh, color:C.blue, margin:"14px 0 6px" }}>Variants</div>
              {vars.map(bake=>(
                <div key={bake.id} style={S.bakeCard(true)} onClick={()=>setModal(bake)}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5, flexWrap:"wrap", gap:6 }}>
                    <div>
                      <span style={{ background:C.blueLight, color:C.blue, padding:"1px 7px", borderRadius:20, fontSize:10, fontFamily:"monospace", marginRight:6 }}>{bake.variantName}</span>
                      <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                    </div>
                    <div style={{ display:"flex", gap:6 }}><Badge outcome={bake.outcome}/><Stars value={bake.rating}/></div>
                  </div>
                  {bake.substitutions && <p style={{ fontSize:11, color:"#4a6a78", fontStyle:"italic", marginBottom:4 }}>{bake.substitutions}</p>}
                  <p style={{ fontSize:12, fontStyle:"italic", margin:0 }}>{bake.notes.slice(0,120)}{bake.notes.length>120?"…":""}</p>
                </div>
              ))}
            </>}
          </div>
        </main>
      </div>
    );
  }

  if (view==="newRecipe") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved}/>
      <main style={S.main}>
        <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("recipes")}>← Back</button>
        <h1 style={S.title}>New Recipe</h1>
        <div style={{ maxWidth:640 }}>
          <div style={S.card}>
            <div style={S.g2}>
              <div><label style={S.label}>Recipe Name</label><input style={S.input} placeholder="e.g. Einkorn Sourdough" value={rf.name} onChange={e=>setR({name:e.target.value})}/></div>
              <div><label style={S.label}>Author / Source</label><input style={S.input} placeholder="e.g. Tartine" value={rf.author} onChange={e=>setR({author:e.target.value})}/></div>
            </div>
            <label style={S.label}>Description</label>
            <input style={S.input} placeholder="Tasting notes…" value={rf.description} onChange={e=>setR({description:e.target.value})}/>
            <div style={S.g2}>
              <div><label style={S.label}>Hydration (%)</label><input type="number" style={S.input} value={rf.hydration} onChange={e=>setR({hydration:parseInt(e.target.value)})}/></div>
              <div><label style={S.label}>Tags (comma-separated)</label><input style={S.input} placeholder="spelt, open crumb…" value={rf.tags} onChange={e=>setR({tags:e.target.value})}/></div>
            </div>
            <hr style={S.divider}/>
            <h3 style={{ fontStyle:"italic", marginBottom:10, fontSize:14 }}>Ingredients</h3>
            {rf.ingredients.map((ing,idx)=>(
              <div key={ing.id} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 65px", gap:6, marginBottom:5 }}>
                <input style={{ ...S.input, marginBottom:0 }} placeholder="Name" value={ing.name} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,name:e.target.value}:i)})}/>
                <input type="number" style={{ ...S.input, marginBottom:0 }} placeholder="Amount" value={ing.amount} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,amount:e.target.value}:i)})}/>
                <select style={{ ...S.input, marginBottom:0 }} value={ing.unit} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,unit:e.target.value}:i)})}>
                  <option>g</option><option>kg</option><option>ml</option><option>tsp</option><option>tbsp</option>
                </select>
              </div>
            ))}
            <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>setR({ingredients:[...rf.ingredients,{id:Date.now(),name:"",amount:"",unit:"g"}]})}>+ Ingredient</button>
            <hr style={S.divider}/>
            <h3 style={{ fontStyle:"italic", marginBottom:10, fontSize:14 }}>Method</h3>
            {rf.steps.map((step,i)=>(
              <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"flex-start" }}>
                <span style={{ minWidth:19, height:19, background:"#e8dcc8", color:"#5a3e28", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0, marginTop:7 }}>{i+1}</span>
                <textarea style={{ ...S.input, marginBottom:0, resize:"vertical", minHeight:40 }} placeholder={`Step ${i+1}…`} value={step} onChange={e=>setR({steps:rf.steps.map((s,j)=>j===i?e.target.value:s)})}/>
              </div>
            ))}
            <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>setR({steps:[...rf.steps,""]})}>+ Step</button>
            <button style={{ ...S.btn, width:"100%", padding:11, fontSize:13, opacity:!rf.name?0.45:1 }} onClick={saveRecipe} disabled={!rf.name}>Save Recipe</button>
          </div>
        </div>
      </main>
    </div>
  );

  if (view==="pantry") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved}/>
      <main style={S.main}><FlourPantry flours={flours} setFlours={setFlours}/></main>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

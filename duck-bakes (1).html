// ── Supabase persistence ──────────────────────────────────────────────────────
async function dbSave(table, arr, profile=null) {
  try {
    if (profile) {
      // For profile-specific tables (bakes), delete only this profile's rows
      await sb.from(table).delete().eq("profile", profile);
      if (arr.length > 0) {
        const rows = arr.map(item => ({ id: item.id, data: item, profile, updated_at: new Date().toISOString() }));
        await sb.from(table).upsert(rows);
      }
    } else {
      // Shared tables (recipes, flours)
      await sb.from(table).delete().neq("id", -1);
      if (arr.length > 0) {
        const rows = arr.map(item => ({ id: item.id, data: item, updated_at: new Date().toISOString() }));
        await sb.from(table).upsert(rows);
      }
    }
  } catch(e) { console.error("dbSave error", table, e); }
}

async function dbLoad(table, fallback, profile=null) {
  try {
    let query = sb.from(table).select("data").order("id");
    if (profile) query = query.eq("profile", profile);
    const { data, error } = await query;
    if (error) throw error;
    if (data && data.length > 0) return data.map(r => r.data);
  } catch(e) { console.error("dbLoad error", table, e); }
  return fallback;
}


// ── AI recipe generation ──────────────────────────────────────────────────────
async function generateRecipeFromBake(bakeData) {
  const { freeformIngredients, freeformSteps, bulkTime, proofTime, ovenTemp, vessel, notes, folds } = bakeData;
  const ingList = freeformIngredients.filter(i=>i.name).map(i=>`${i.amount}${i.unit} ${i.name}`).join(", ");
  const stepList = freeformSteps.filter(Boolean).join(" | ");
  const foldSummary = folds?.length ? `${folds.length} folds (${folds.map(f=>f.technique).join(", ")})` : "";

  // Auto-calculate hydration
  const flourKeywords = ["flour","farina","wheat","spelt","rye","einkorn","fife","semolina","blend"];
  const waterKeywords = ["water"];
  const flours = freeformIngredients.filter(i=>flourKeywords.some(k=>i.name.toLowerCase().includes(k)));
  const waters = freeformIngredients.filter(i=>waterKeywords.some(k=>i.name.toLowerCase().includes(k)));
  const totalFlour = flours.reduce((s,i)=>s+parseFloat(i.amount||0),0);
  const totalWater = waters.reduce((s,i)=>s+parseFloat(i.amount||0),0);
  const hydration = totalFlour>0 ? Math.round(totalWater/totalFlour*100) : 75;

  const prompt = `You are a sourdough baking assistant. A baker logged a bake with these details:
Ingredients: ${ingList}
Method notes: ${stepList || "none provided"}
Bulk ferment: ${bulkTime||"unknown"}, Cold proof: ${proofTime||"unknown"}
Oven: ${ovenTemp||"unknown"}, Vessel: ${vessel||"unknown"}
Folds: ${foldSummary||"none"}
Bake notes: ${notes||"none"}

Generate a sourdough recipe from this. Respond ONLY with valid JSON, no markdown, no backticks:
{
  "name": "short evocative recipe name (max 5 words)",
  "description": "one sentence tasting notes / description",
  "tags": ["tag1","tag2"],
  "steps": ["step 1","step 2","step 3","step 4","step 5","step 6"]
}
Steps should be concise practical instructions inferred from the data. Max 6 steps.`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:600,
      messages:[{role:"user",content:prompt}]
    })
  });
  const data = await resp.json();
  const text = data.content?.[0]?.text||"{}";
  try {
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    return { ...parsed, hydration, autoGenerated:true };
  } catch(e) {
    return { name:"My Sourdough", description:"", tags:[], steps:[], hydration, autoGenerated:true };
  }
}

// ── Variant Ingredients Editor ────────────────────────────────────────────────
function VariantIngredientsEditor({ baseIngredients, variantIngredients, onChange }) {
  // initialise from base if empty
  const rows = variantIngredients.length > 0
    ? variantIngredients
    : baseIngredients.map(ing => ({ ...ing, baseAmount: ing.amount, baseName: ing.name, isNew: false }));

  function updateRow(idx, patch) {
    const next = rows.map((r,i) => i===idx ? {...r,...patch} : r);
    onChange(next);
  }
  function addRow() {
    onChange([...rows, { id: Date.now()+Math.random(), name:"", amount:"", unit:"g", baseAmount:null, baseName:null, isNew:true }]);
  }
  function removeRow(idx) {
    onChange(rows.filter((_,i) => i!==idx));
  }
  // init on first render if needed
  React.useEffect(() => {
    if (variantIngredients.length === 0 && baseIngredients.length > 0) {
      onChange(baseIngredients.map(ing => ({ ...ing, baseAmount: ing.amount, baseName: ing.name, isNew: false })));
    }
  }, []);

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"2.5fr 1fr 60px 28px", gap:5, marginBottom:4 }}>
        {["Ingredient","Amount","Unit",""].map(h => <div key={h} style={{ ...S.label, marginBottom:0 }}>{h}</div>)}
      </div>
      {rows.map((row, idx) => {
        const amtChanged = row.baseAmount !== null && String(row.amount) !== String(row.baseAmount);
        const nameChanged = row.baseName !== null && row.name !== row.baseName;
        const changed = amtChanged || nameChanged || row.isNew;
        const rowStyle = changed
          ? { borderLeft:"3px solid #c17f2a", paddingLeft:7, marginBottom:5, background:"#fdf5e6", borderRadius:"0 3px 3px 0" }

// ── Mini SVG bar chart ────────────────────────────────────────────────────────
function MiniBar({ value, max, color="#8b5e3c", height=18 }) {
  const pct = max > 0 ? Math.max(3, Math.round((value / max) * 100)) : 0;
  return (
    <div style={{ flex:1, background:"#f0e8d8", borderRadius:20, height, overflow:"hidden" }}>
      <div style={{ width:`${pct}%`, background:color, height:"100%", borderRadius:20, transition:"width 0.4s ease" }}/>
    </div>
  );
}

// ── Sparkline (SVG path) ──────────────────────────────────────────────────────
function Sparkline({ points, color="#8b5e3c", height=48 }) {
  if (points.length < 2) return null;
  const w = 300, h = height;
  const minV = Math.min(...points), maxV = Math.max(...points);
  const range = maxV - minV || 1;
  const xs = points.map((_,i) => (i/(points.length-1))*w);
  const ys = points.map(v => h - ((v-minV)/range)*(h*0.8) - h*0.1);
  const d = xs.map((x,i) => `${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width:"100%", height, display:"block" }} preserveAspectRatio="none">
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map((x,i) => <circle key={i} cx={x} cy={ys[i]} r="3" fill={color}/>)}
    </svg>
  );
}

function StatsView({ bakes, recipes }) {
  if (bakes.length === 0) return (
    <div style={{ textAlign:"center", padding:60, color:"#8b6a50", fontStyle:"italic" }}>
      Log some bakes first — stats will appear here.
    </div>
  );

  const getRecipe = id => recipes.find(r=>r.id===id);

  // ── Derived stats ─────────────────────────────────────────────────────────
  const total = bakes.length;
  const avgRating = (bakes.reduce((s,b)=>s+(b.rating||0),0)/total).toFixed(1);
  const variants = bakes.filter(b=>b.isVariant).length;

  // Outcome breakdown
  const outcomeCounts = { excellent:0, good:0, okay:0, poor:0 };
  bakes.forEach(b=>{ if (outcomeCounts[b.outcome]!==undefined) outcomeCounts[b.outcome]++; });
  const maxOutcome = Math.max(...Object.values(outcomeCounts));

  // Bakes per month (last 12 months)
  const monthMap = {};
  bakes.forEach(b=>{
    const d = new Date(b.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    monthMap[key] = (monthMap[key]||0) + 1;
  });
  const sortedMonths = Object.keys(monthMap).sort();
  const last12 = sortedMonths.slice(-12);
  const monthLabels = last12.map(k=>{ const [y,m]=k.split("-"); return new Date(y,m-1).toLocaleDateString("en-US",{month:"short"}); });
  const monthCounts = last12.map(k=>monthMap[k]);
  const maxMonth = Math.max(...monthCounts, 1);

  // Rating over time (chronological)
  const chronoBakes = [...bakes].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const ratingPoints = chronoBakes.map(b=>b.rating||0).filter(Boolean);

  // Top recipes by bake count
  const recipeCounts = {};
  bakes.forEach(b=>{ recipeCounts[b.recipeId]=(recipeCounts[b.recipeId]||0)+1; });
  const topRecipes = Object.entries(recipeCounts)
    .map(([id,count])=>({ recipe:getRecipe(parseInt(id)), count }))
    .filter(x=>x.recipe)
    .sort((a,b)=>b.count-a.count)
    .slice(0,5);
  const maxRecipeCount = Math.max(...topRecipes.map(x=>x.count), 1);

  // Avg rating per recipe
  const recipeRatings = {};
  const recipeRatingCounts = {};
  bakes.forEach(b=>{
    if (!b.rating) return;
    recipeRatings[b.recipeId]=(recipeRatings[b.recipeId]||0)+b.rating;
    recipeRatingCounts[b.recipeId]=(recipeRatingCounts[b.recipeId]||0)+1;
  });

  // Location split
  const locCounts = {};
  bakes.forEach(b=>{ locCounts[b.location]=(locCounts[b.location]||0)+1; });

  // Best streak (consecutive days with a bake)
  const bakeDays = [...new Set(bakes.map(b=>b.date))].sort();
  let streak=1, maxStreak=1, cur=1;
  for (let i=1;i<bakeDays.length;i++) {
    const diff=(new Date(bakeDays[i])-new Date(bakeDays[i-1]))/(1000*60*60*24);
    if (diff<=7) { cur++; maxStreak=Math.max(maxStreak,cur); } else cur=1;
  }

  const statCard = (children, extra={}) => (
    <div style={{ ...S.card, ...extra }}>{children}</div>
  );
  const sh = (txt) => <div style={{ ...S.sh, marginBottom:10 }}>{txt}</div>;
  const bigNum = (n, label) => (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:36, fontWeight:700, fontStyle:"italic", color:C.brown, lineHeight:1 }}>{n}</div>
      <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginTop:3 }}>{label}</div>
    </div>
  );

  return (
    <div>
      <h1 style={S.title}>Stats</h1>
      <p style={{ ...S.sub, marginBottom:20 }}>Your baking at a glance</p>

      {/* Top-line numbers */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:12 }}>
        {statCard(bigNum(total, "total bakes"))}
        {statCard(bigNum(avgRating+"★", "avg rating"))}
        {statCard(bigNum(variants, "variants"))}
        {statCard(bigNum(maxStreak, "bake streak*"))}
      </div>
      <div style={{ fontFamily:"monospace", fontSize:9, color:C.muted, marginBottom:16, textAlign:"right" }}>* bakes within 7 days of each other</div>

      {/* Rating over time */}
      {ratingPoints.length >= 2 && statCard(<>
        {sh("Rating over time")}
        <Sparkline points={ratingPoints} color={C.gold}/>
        <div style={{ display:"flex", justifyContent:"space-between", fontFamily:"monospace", fontSize:9, color:C.muted, marginTop:4 }}>
          <span>{chronoBakes[0]?.date}</span><span>{chronoBakes[chronoBakes.length-1]?.date}</span>
        </div>
      </>)}

      {/* Bakes per month */}
      {last12.length > 0 && statCard(<>
        {sh("Bakes per month")}
        <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
          {last12.map((k,i)=>(
            <div key={k} style={{ display:"flex", alignItems:"center", gap:9 }}>
              <div style={{ width:30, fontFamily:"monospace", fontSize:10, color:C.muted, flexShrink:0 }}>{monthLabels[i]}</div>
              <MiniBar value={monthCounts[i]} max={maxMonth} color={C.brown}/>
              <div style={{ width:18, textAlign:"right", fontFamily:"monospace", fontSize:11, fontWeight:600, color:C.brown }}>{monthCounts[i]}</div>
            </div>
          ))}
        </div>
      </>)}

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {/* Outcome breakdown */}
        {statCard(<>
          {sh("Outcomes")}
          {Object.entries(OUTCOMES).map(([k,v])=>(
            <div key={k} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
              <div style={{ width:60, fontSize:11 }}>{v.label}</div>
              <MiniBar value={outcomeCounts[k]} max={maxOutcome} color={v.bg==="transparent"?C.muted:v.bg}/>
              <div style={{ width:22, textAlign:"right", fontFamily:"monospace", fontSize:11, color:C.muted }}>{outcomeCounts[k]}</div>
            </div>
          ))}
        </>)}

        {/* Location split */}
        {statCard(<>
          {sh("Where you bake")}
          {Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).map(([loc,cnt])=>(
            <div key={loc} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
              <div style={{ width:50, fontSize:11 }}>{loc==="Home"?"🏠":loc==="Work"?"🏢":"📍"} {loc}</div>
              <MiniBar value={cnt} max={total} color={C.blue}/>
              <div style={{ width:22, textAlign:"right", fontFamily:"monospace", fontSize:11, color:C.muted }}>{cnt}</div>
            </div>
          ))}
        </>)}
      </div>

      {/* Top recipes */}
      {topRecipes.length > 0 && statCard(<>
        {sh("Most baked recipes")}
        {topRecipes.map(({recipe, count})=>{
          const avgR = recipeRatings[recipe.id] ? (recipeRatings[recipe.id]/recipeRatingCounts[recipe.id]).toFixed(1) : "—";
          return (
            <div key={recipe.id} style={{ display:"flex", alignItems:"center", gap:9, marginBottom:8 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontStyle:"italic", fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{recipe.name}</div>
                <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{count} bake{count!==1?"s":""} · avg {avgR}★</div>
              </div>
              <MiniBar value={count} max={maxRecipeCount} color={C.brown}/>
              <div style={{ width:22, textAlign:"right", fontFamily:"monospace", fontSize:12, fontWeight:700, color:C.brown }}>{count}</div>
            </div>
          );
        })}
      </>)}

    </div>
  );
}

function ProfilePicker({ onSelect }) {
  return (
    <div style={{ minHeight:"100vh", background:"#1c120a", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Georgia,serif" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:52, marginBottom:8 }}>🦆</div>
        <h1 style={{ color:"#f5e6c8", fontSize:32, fontWeight:400, fontStyle:"italic", marginBottom:6 }}>Duck Bakes</h1>
        <p style={{ color:"#8b6a50", fontFamily:"monospace", fontSize:12, marginBottom:40, letterSpacing:"0.5px" }}>Who's baking today?</p>
        <div style={{ display:"flex", gap:16, justifyContent:"center" }}>
          {Object.entries(PROFILES).map(([key, prof]) => (
            <button key={key} onClick={() => onSelect(key)}
              style={{ background: prof.light, border:`2px solid ${prof.color}`, borderRadius:12, padding:"28px 36px", cursor:"pointer", fontFamily:"Georgia,serif", transition:"transform 0.1s" }}
              onMouseOver={e=>e.currentTarget.style.transform="scale(1.04)"}
              onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
              <div style={{ fontSize:44, marginBottom:10 }}>{prof.emoji}</div>
              <div style={{ fontSize:16, fontStyle:"italic", color:"#1c120a", fontWeight:600 }}>{prof.label}</div>

}


function App() {
  const [profile, setProfile] = useState(null);
  const [view, setView] = useState("journal");
  const [recipes, setRecipes] = useState(BASE_RECIPES);
  const [bakes, setBakes]     = useState(SAMPLE_BAKES);
  const [flours, setFlours]   = useState(DEFAULT_FLOURS);
  const [loaded, setLoaded]   = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [selRecipe, setSelRecipe] = useState(null);
  const [scale, setScale] = useState(1);
  const [bf, setBakeForm] = useState(emptyBake());
  const [rf, setRecipeForm] = useState({ name:"", author:"", description:"", hydration:75, tags:"", ingredients:[{id:Date.now(),name:"",amount:"",unit:"g"}], steps:[""] });
  const [modal, setModal] = useState(null);
  const [saved, setSaved] = useState(false);
  const [editingBakeId, setEditingBakeId] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [recipePreview, setRecipePreview] = useState(null);
  const [generatingRecipe, setGeneratingRecipe] = useState(false);
  const [search, setSearch] = useState("");
  const [filterRecipe, setFilterRecipe] = useState("");
  const [filterOutcome, setFilterOutcome] = useState("");
  const [filterLocation, setFilterLocation] = useState("");

  // Show profile picker if no profile selected
  if (!profile) return <ProfilePicker onSelect={p => { setProfile(p); setLoaded(false); }} />;

  // Load from Supabase when profile is selected
  useEffect(() => {
    if (!profile) return;
    setLoaded(false);
    setBakes(SAMPLE_BAKES);
    (async () => {
      setSyncing(true);
      const [r, b, f] = await Promise.all([
        dbLoad("recipes", null),
        dbLoad("bakes",   null, profile),
        dbLoad("flours",  null),
      ]);
      if (r) setRecipes(r);
      if (b) setBakes(b); else setBakes([]);
      if (f) setFlours(f);
      setLoaded(true);
      setSyncing(false);
    })();
  }, [profile]);

  // Auto-save to Supabase whenever data changes (only after initial load)
  useEffect(() => { if (loaded) { setSyncing(true); dbSave("recipes", recipes).then(()=>setSyncing(false)); flashSaved(); } }, [recipes, loaded]);
  useEffect(() => { if (loaded) { setSyncing(true); dbSave("bakes",   bakes, profile).then(()=>setSyncing(false)); flashSaved(); } }, [bakes,   loaded]);
  useEffect(() => { if (loaded) { setSyncing(true); dbSave("flours",  flours ).then(()=>setSyncing(false)); flashSaved(); } }, [flours,  loaded]);

  function flashSaved() { setSaved(true); setTimeout(()=>setSaved(false), 2000); }

  const set = patch => setBakeForm(p=>({...p,...patch}));
  const setR = patch => setRecipeForm(p=>({...p,...patch}));
  const sorted = [...bakes].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const getRecipe = id => recipes.find(r=>r.id===id);
  const sc = n => { const v=n*scale; return v%1===0?v:v.toFixed(1); };

  function startEditBake(bake, e) {
    e.stopPropagation();
    setEditingBakeId(bake.id);
    setBakeForm({...bake, recipeId: String(bake.recipeId)});
    setView("newBake");
  }
  function deleteBake(id, e) {
    e.stopPropagation();
    setDeleteConfirm(id);
  }
  function confirmDelete() {
    setBakes(bakes.filter(b => b.id !== deleteConfirm));
    setDeleteConfirm(null);
  }

  async function saveBake() {
    if (bf.isFreeform) {
      if (!bf.notes) return;
      setGeneratingRecipe(true);
      const generated = await generateRecipeFromBake(bf);
      setGeneratingRecipe(false);
      setRecipePreview({
        ...generated,
        ingredients: bf.freeformIngredients.filter(i=>i.name).map((i,idx)=>({...i,id:"fi"+idx})),
        _pendingBake: bf,
      });
      return;
    }
    if (!bf.recipeId||!bf.notes) return;
    if (editingBakeId) {
      setBakes(bakes.map(b => b.id===editingBakeId ? {...bf, id:editingBakeId, recipeId:parseInt(bf.recipeId)} : b));
      setEditingBakeId(null);
    } else {
      setBakes([...bakes,{...bf,id:Date.now(),recipeId:parseInt(bf.recipeId)}]);
    }
    setBakeForm(emptyBake()); setView("journal");
  }
  function confirmSaveFreeform(editedPreview) {
    const newRecipeId = Date.now();
    const newRecipe = {
      id: newRecipeId,
      name: editedPreview.name,
      description: editedPreview.description,
      hydration: editedPreview.hydration,
      tags: editedPreview.tags||[],
      author: "My bake",
      ingredients: editedPreview.ingredients,
      steps: editedPreview.steps,
    };
    setRecipes(r=>[...r, newRecipe]);
    const bake = {...editedPreview._pendingBake, recipeId: newRecipeId, id: Date.now()+1};
    setBakes(b=>[...b, bake]);
    setRecipePreview(null);
    setBakeForm(emptyBake());
    setView("journal");
  }
  function saveRecipe() {
    if (!rf.name) return;
    setRecipes([...recipes,{...rf,id:Date.now(),tags:rf.tags.split(",").map(t=>t.trim()).filter(Boolean),ingredients:rf.ingredients.filter(i=>i.name),steps:rf.steps.filter(Boolean)}]);
    setView("recipes");
  }
  function addFold() { set({ folds:[...bf.folds,emptyFold()] }); }
  function upFold(id,p) { set({ folds:bf.folds.map(f=>f.id===id?{...f,...p}:f) }); }
  function rmFold(id) { set({ folds:bf.folds.filter(f=>f.id!==id) }); }

  if (!loaded) return (
    <div style={{ minHeight:"100vh", background:"#1c120a", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Georgia,serif" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:40, marginBottom:16 }}>{PROFILES[profile]?.emoji || "🦆"}</div>
        <div style={{ fontFamily:"monospace", fontSize:13, color:"#8b6a50" }}>Loading {PROFILES[profile]?.label}'s journal…</div>
      </div>
    </div>
  );

  if (view==="journal") return (
    <div style={S.app}>
      {modal && <BakeModal bake={modal} recipe={getRecipe(modal.recipeId)} onClose={()=>setModal(null)}/>}
      {recipePreview && <RecipePreviewModal preview={recipePreview} onConfirm={confirmSaveFreeform} onCancel={()=>setRecipePreview(null)}/>}
      {deleteConfirm && (
        <div style={{ position:"fixed", inset:0, background:"rgba(28,18,10,0.6)", zIndex:400, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:C.paper, border:`1px solid ${C.border}`, borderRadius:6, maxWidth:360, width:"100%", padding:24, boxShadow:"0 8px 40px rgba(0,0,0,0.3)", textAlign:"center" }}>
            <div style={{ fontSize:28, marginBottom:10 }}>🗑</div>
            <h3 style={{ fontStyle:"italic", fontSize:17, marginBottom:6 }}>Delete this bake?</h3>
            <p style={{ fontSize:12, color:C.muted, marginBottom:18 }}>This can't be undone.</p>
            <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
              <button style={S.btnO} onClick={()=>setDeleteConfirm(null)}>Cancel</button>
              <button style={{ ...S.btn, background:"#7a2020" }} onClick={confirmDelete}>Delete</button>
            </div>
          </div>
        </div>
      )}
      <Nav view={view} setView={setView} saved={saved} syncing={syncing} profile={profile} onSwitchProfile={()=>{setProfile(null);setLoaded(false);setView("journal");}}/>
      <main style={S.main}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
          <div><h1 style={S.title}>Bake Journal</h1></div>
          <button style={S.btn} onClick={()=>{ setEditingBakeId(null); setBakeForm(emptyBake()); setView("newBake"); }}>+ Log a Bake</button>
        </div>

        {/* Search + filter bar */}
        <div style={{ background:C.paper, border:`1px solid ${C.border}`, borderRadius:4, padding:"12px 14px", marginBottom:16, boxShadow:"0 1px 4px rgba(44,31,14,.04)" }}>
          <input
            style={{ ...S.input, marginBottom:8, paddingLeft:12 }}
            placeholder="Search notes, recipe names, variants…"
            value={search}
            onChange={e=>setSearch(e.target.value)}
          />
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            <div>
              <label style={S.label}>Recipe</label>
              <select style={{ ...S.input, marginBottom:0 }} value={filterRecipe} onChange={e=>setFilterRecipe(e.target.value)}>
                <option value="">All recipes</option>
                {recipes.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
            <div>
              <label style={S.label}>Outcome</label>
              <select style={{ ...S.input, marginBottom:0 }} value={filterOutcome} onChange={e=>setFilterOutcome(e.target.value)}>
                <option value="">All outcomes</option>
                {Object.entries(OUTCOMES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            <div>
              <label style={S.label}>Location</label>
              <select style={{ ...S.input, marginBottom:0 }} value={filterLocation} onChange={e=>setFilterLocation(e.target.value)}>
                <option value="">All locations</option>
                {LOCATIONS.map(l=><option key={l} value={l}>{l}</option>)}
              </select>
            </div>
          </div>
          {(search||filterRecipe||filterOutcome||filterLocation) && (
            <button style={{ ...S.btnSm, marginTop:8, fontSize:10 }} onClick={()=>{ setSearch(""); setFilterRecipe(""); setFilterOutcome(""); setFilterLocation(""); }}>
              ✕ clear filters
            </button>
          )}
        </div>

        {(()=>{
          const q = search.toLowerCase();
          const filtered = sorted.filter(bake=>{
            const rec = getRecipe(bake.recipeId);
            if (filterRecipe && String(bake.recipeId)!==filterRecipe) return false;
            if (filterOutcome && bake.outcome!==filterOutcome) return false;
            if (filterLocation && bake.location!==filterLocation) return false;
            if (q) {
              const haystack = [
                rec?.name||"", bake.notes||"", bake.variantName||"",
                bake.location||"", bake.vessel||"",
                ...(bake.variantIngredients||[]).map(i=>i.name),
                ...(bake.freeformIngredients||[]).map(i=>i.name),
              ].join(" ").toLowerCase();
              if (!haystack.includes(q)) return false;
            }
            return true;
          });
          return <>
            <p style={{ ...S.sub, marginBottom:12 }}>
              {filtered.length === bakes.length
                ? `${bakes.length} bake${bakes.length!==1?"s":""} recorded`
                : `${filtered.length} of ${bakes.length} bake${bakes.length!==1?"s":""}`}
            </p>
            {filtered.length===0 && (
              <div style={{ ...S.card, textAlign:"center", color:C.muted, fontStyle:"italic", padding:32 }}>
                No bakes match your search.
              </div>
            )}
            {filtered.map(bake=>{
              const rec = getRecipe(bake.recipeId);
              return (
                <div key={bake.id} style={S.bakeCard(bake.isVariant)} onClick={()=>setModal(bake)}>
                  <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginBottom:6 }}>
                    <div>
                      <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3 }}>
                        <span style={{ fontStyle:"italic", fontSize:15, fontWeight:600 }}>{rec?.name}</span>
                        {bake.isVariant && <span style={{ background:C.blueLight, color:C.blue, padding:"1px 7px", borderRadius:20, fontSize:10, fontFamily:"monospace" }}>↪ {bake.variantName}</span>}
                      </div>
                      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                        <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                        <Loc location={bake.location}/>
                        <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🫕 {bake.vessel}</span>
                        {bake.folds?.length>0 && <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>✋ {bake.folds.length} folds</span>}
                        {bake.doughTempAtMix && <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🌡 {bake.doughTempAtMix} at mix</span>}
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      {bake.videoUrl && <span style={{ fontSize:12 }}>🎬</span>}
                      {bake.photoUrl && <span style={{ fontSize:12 }}>📸</span>}
                      <Badge outcome={bake.outcome}/><Stars value={bake.rating}/>
                      <button style={{ ...S.btnSm, padding:"3px 8px", fontSize:13 }} onClick={e=>startEditBake(bake,e)} title="Edit">✏️</button>
                      <button style={{ ...S.btnX, padding:"3px 8px", fontSize:13 }} onClick={e=>deleteBake(bake.id,e)} title="Delete">🗑</button>
                    </div>
                  </div>
                  <p style={{ fontSize:12, lineHeight:1.65, fontStyle:"italic", color:"#3a2a18", margin:0 }}>"{bake.notes.slice(0,145)}{bake.notes.length>145?"…":""}"</p>
                </div>
              );
            })}
          </>;
        })()}
      </main>
    </div>
  );

  if (view==="newBake") return (
    <div style={S.app}>
      {recipePreview && <RecipePreviewModal preview={recipePreview} onConfirm={confirmSaveFreeform} onCancel={()=>setRecipePreview(null)}/>}
      <Nav view={view} setView={setView} saved={saved} syncing={syncing} profile={profile} onSwitchProfile={()=>{setProfile(null);setLoaded(false);setView("journal");}}/>
      <main style={S.main}>
        <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("journal")}>← Back</button>
        <h1 style={S.title}>{editingBakeId ? "Edit Bake" : "Log a Bake"}</h1>
        <p style={S.sub}>{editingBakeId ? "Update your bake record" : "Record while the memory is fresh"}</p>
        <div style={{ maxWidth:640 }}>
          <div style={S.card}>
            <div style={S.g2}>
              <div><label style={S.label}>Recipe</label>
                <select style={S.input} value={bf.isFreeform ? "freeform" : bf.recipeId}
                  onChange={e=>{
                    if (e.target.value==="freeform") {
                      set({isFreeform:true, recipeId:"", variantIngredients:[], isVariant:false,
                           freeformIngredients:[{id:Date.now(),name:"",amount:"",unit:"g"}],
                           freeformSteps:[""]});
                    } else {
                      set({isFreeform:false, recipeId:e.target.value, variantIngredients:[], freeformIngredients:[], freeformSteps:[]});
                    }
                  }}>
                  <option value="">Select…</option>
                  {recipes.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                  <option value="freeform">✨ New freeform bake (generate recipe)</option>
                </select></div>
              <div><label style={S.label}>Date</label><input type="date" style={S.input} value={bf.date} onChange={e=>set({date:e.target.value})}/></div>
            </div>

            {bf.isFreeform && (
              <div style={{ background:"#f5f0e4", border:"1px solid #d4bc88", borderRadius:4, padding:"13px 14px", marginBottom:11 }}>
                <div style={{ fontFamily:"monospace", fontSize:10, color:"#7a5a28", letterSpacing:"0.8px", textTransform:"uppercase", marginBottom:10 }}>
                  ✨ Freeform bake — ingredients & method
                </div>
                <div style={{ fontSize:11, color:"#7a5a28", fontFamily:"monospace", marginBottom:10 }}>
                  Fill in what you used. We'll generate a recipe from this when you save.
                </div>
                <div style={{ ...S.sh, marginBottom:6 }}>Ingredients</div>
                <div style={{ display:"grid", gridTemplateColumns:"2.5fr 1fr 60px 28px", gap:5, marginBottom:4 }}>
                  {["Ingredient","Amount","Unit",""].map(h=><div key={h} style={{ ...S.label, marginBottom:0, fontSize:9 }}>{h}</div>)}
                </div>
                {(bf.freeformIngredients||[]).map((ing,idx)=>(
                  <div key={ing.id} style={{ display:"grid", gridTemplateColumns:"2.5fr 1fr 60px 28px", gap:5, marginBottom:5, alignItems:"center" }}>
                    <input style={{ ...S.input, marginBottom:0 }} placeholder="e.g. Red fife flour" value={ing.name}
                      onChange={e=>set({freeformIngredients:bf.freeformIngredients.map((i,j)=>j===idx?{...i,name:e.target.value}:i)})}/>
                    <input type="number" style={{ ...S.input, marginBottom:0 }} placeholder="0" value={ing.amount}
                      onChange={e=>set({freeformIngredients:bf.freeformIngredients.map((i,j)=>j===idx?{...i,amount:e.target.value}:i)})}/>
                    <select style={{ ...S.input, marginBottom:0, padding:"7px 4px" }} value={ing.unit}
                      onChange={e=>set({freeformIngredients:bf.freeformIngredients.map((i,j)=>j===idx?{...i,unit:e.target.value}:i)})}>
                      <option>g</option><option>kg</option><option>ml</option><option>tsp</option><option>tbsp</option>
                    </select>
                    <button style={{ ...S.btnX, padding:"4px 6px" }} onClick={()=>set({freeformIngredients:bf.freeformIngredients.filter((_,j)=>j!==idx)})}>✕</button>
                  </div>
                ))}
                <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>set({freeformIngredients:[...(bf.freeformIngredients||[]),{id:Date.now(),name:"",amount:"",unit:"g"}]})}>+ Ingredient</button>
                <div style={{ ...S.sh, marginBottom:6, marginTop:4 }}>Method Notes <span style={{ fontWeight:400, textTransform:"none", letterSpacing:0 }}>(optional — helps generate better steps)</span></div>
                {(bf.freeformSteps||[]).map((step,i)=>(
                  <div key={i} style={{ display:"flex", gap:7, marginBottom:6, alignItems:"flex-start" }}>
                    <span style={{ minWidth:17, height:17, background:"#c17f2a", color:"#fff", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0, marginTop:7 }}>{i+1}</span>
                    <textarea style={{ ...S.input, marginBottom:0, resize:"vertical", minHeight:36 }} placeholder={`e.g. Autolyse 45 min, then added levain…`}
                      value={step} onChange={e=>set({freeformSteps:bf.freeformSteps.map((s,j)=>j===i?e.target.value:s)})}/>
                  </div>
                ))}
                <button style={S.btnSm} onClick={()=>set({freeformSteps:[...(bf.freeformSteps||[]),""]})}>+ Step</button>
              </div>
            )}

            {!bf.isFreeform && (
            <label style={{ display:"flex", alignItems:"center", gap:7, cursor:"pointer", fontSize:13, marginBottom:10 }}>
              <input type="checkbox" checked={bf.isVariant} onChange={e=>set({isVariant:e.target.checked})} style={{ accentColor:C.brown }}/>
              This bake is a variant / uses substitutions
            </label>
            )}
            {!bf.isFreeform && bf.isVariant && (
              <div style={{ background:"#eef5f8", border:`1px solid #b8d0dc`, borderRadius:4, padding:"11px 13px", marginBottom:11 }}>
                <label style={S.label}>Variant Name</label>
                <input style={{ ...S.input, marginBottom:11 }} placeholder="e.g. Red fife + spelt blend" value={bf.variantName} onChange={e=>set({variantName:e.target.value})}/>
                <div style={{ ...S.sh, color:"#4a6a78", marginBottom:8 }}>Ingredients — edit amounts or names, add new rows</div>
                <div style={{ fontSize:10, fontFamily:"monospace", color:"#6a8a98", marginBottom:8 }}>
                  🟡 Amber highlight = changed from base recipe
                </div>
                {bf.recipeId
                  ? <VariantIngredientsEditor
                      baseIngredients={recipes.find(r=>r.id===parseInt(bf.recipeId))?.ingredients||[]}
                      variantIngredients={bf.variantIngredients||[]}
                      onChange={vi=>set({variantIngredients:vi})}
                    />
                  : <div style={{ fontStyle:"italic", fontSize:12, color:C.muted }}>Select a recipe first to load its ingredients.</div>
                }
              </div>
            )}
            <hr style={S.divider}/>
            <div style={S.g3}>
              <div><label style={S.label}>Location</label>
                <select style={S.input} value={bf.location} onChange={e=>set({location:e.target.value})}>
                  {LOCATIONS.map(l=><option key={l}>{l}</option>)}
                </select></div>
              <div><label style={S.label}>Vessel</label>
                <select style={S.input} value={bf.vessel} onChange={e=>set({vessel:e.target.value})}>
                  {VESSELS.map(v=><option key={v}>{v}</option>)}
                </select></div>
              <div><label style={S.label}>Oven Temp</label><input style={S.input} placeholder="e.g. 500°F" value={bf.ovenTemp} onChange={e=>set({ovenTemp:e.target.value})}/></div>
            </div>
            <div style={S.g2}>
              <div><label style={S.label}>Bulk Ferment</label><input style={S.input} placeholder="e.g. 5 hrs" value={bf.bulkTime} onChange={e=>set({bulkTime:e.target.value})}/></div>
              <div><label style={S.label}>Cold Proof</label><input style={S.input} placeholder="e.g. 14 hrs" value={bf.proofTime} onChange={e=>set({proofTime:e.target.value})}/></div>
            </div>

            <hr style={S.divider}/>
            <div style={{ ...S.sh, marginBottom:9 }}>Folds & Dough Temp</div>
            <div style={S.g2}>
              <div><label style={S.label}>Dough Temp at Mix</label><input style={S.input} placeholder="e.g. 76°F" value={bf.doughTempAtMix} onChange={e=>set({doughTempAtMix:e.target.value})}/></div>
              <div/>
            </div>
            <div style={{ background:"#f8f4ec", borderRadius:4, overflow:"hidden", marginBottom:9 }}>
              <div style={{ display:"grid", gridTemplateColumns:"2fr 2fr 1.5fr 32px", gap:0, borderBottom:`1px solid ${C.border}`, padding:"5px 11px" }}>
                {["Technique","Time into Bulk","Dough Temp",""].map(h=><div key={h} style={{ ...S.label, marginBottom:0, fontSize:9 }}>{h}</div>)}
              </div>
              {bf.folds.map((fold,i)=>(
                <div key={fold.id} style={{ display:"grid", gridTemplateColumns:"2fr 2fr 1.5fr 32px", gap:0, padding:"5px 11px 5px", borderBottom:`1px solid #f0e8d8`, alignItems:"center" }}>
                  <select style={{ ...S.input, marginBottom:0, border:"none", background:"transparent", padding:"4px 2px", fontSize:12 }} value={fold.technique} onChange={e=>upFold(fold.id,{technique:e.target.value})}>
                    {FOLD_TECHNIQUES.map(t=><option key={t}>{t}</option>)}
                  </select>
                  <input style={{ ...S.input, marginBottom:0, border:"none", background:"transparent", padding:"4px 6px", fontSize:12 }} placeholder="30 min" value={fold.interval} onChange={e=>upFold(fold.id,{interval:e.target.value})}/>
                  <input style={{ ...S.input, marginBottom:0, border:"none", background:"transparent", padding:"4px 6px", fontSize:12 }} placeholder="78°F" value={fold.doughTemp} onChange={e=>upFold(fold.id,{doughTemp:e.target.value})}/>
                  <button style={{ background:"none", border:"none", color:"#b08060", cursor:"pointer", fontSize:14, padding:"2px 4px" }} onClick={()=>rmFold(fold.id)}>✕</button>
                </div>
              ))}
              <div style={{ padding:"6px 11px" }}>
                <button style={{ background:"none", border:"none", color:C.brown, fontFamily:"monospace", fontSize:11, cursor:"pointer", padding:"2px 0", letterSpacing:"0.5px" }} onClick={addFold}>+ add fold</button>
              </div>
            </div>
            <hr style={S.divider}/>
            <div style={S.sh}>Outcome</div>
            <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
              {Object.entries(OUTCOMES).map(([k,v])=>(
                <button key={k} onClick={()=>set({outcome:k})}
                  style={{ background:bf.outcome===k?v.bg:"transparent", color:bf.outcome===k?v.text:C.muted, border:`1.5px solid ${bf.outcome===k?v.bg:"#d0bc98"}`, padding:"4px 12px", borderRadius:20, cursor:"pointer", fontFamily:"monospace", fontSize:11 }}>
                  {v.label}
                </button>
              ))}
            </div>
            <label style={S.label}>Rating</label>
            <div style={{ marginBottom:10 }}><Stars value={bf.rating} onChange={v=>set({rating:v})}/></div>
            <label style={S.label}>Notes</label>
            <textarea style={{ ...S.input, minHeight:80, resize:"vertical" }} placeholder="Crumb, crust, taste, what to try next…" value={bf.notes} onChange={e=>set({notes:e.target.value})}/>
            <hr style={S.divider}/>
            <div style={S.sh}>Media (optional)</div>
            <label style={S.label}>Video URL (YouTube / Vimeo)</label>
            <input style={S.input} placeholder="https://youtu.be/…" value={bf.videoUrl} onChange={e=>set({videoUrl:e.target.value})}/>
            <label style={S.label}>Photo</label>
            {bf.photoUrl
              ? <div style={{ position:"relative", marginBottom:8 }}>
                  <img src={bf.photoUrl} alt="bake preview" style={{ width:"100%", maxHeight:200, objectFit:"cover", borderRadius:4, display:"block" }}/>
                  <button onClick={()=>set({photoUrl:""})} style={{ position:"absolute", top:6, right:6, background:"rgba(28,18,10,0.65)", color:"#f5e6c8", border:"none", borderRadius:3, padding:"3px 8px", cursor:"pointer", fontSize:11 }}>Remove</button>
                </div>
              : <label style={{ display:"block", border:"2px dashed #d0bc98", borderRadius:4, padding:"18px", textAlign:"center", cursor:"pointer", marginBottom:8, background:"#faf7f0" }}>
                  <div style={{ fontSize:22, marginBottom:4 }}>📷</div>
                  <div style={{ fontSize:12, color:C.muted, fontFamily:"monospace" }}>Click to upload a photo</div>
                  <div style={{ fontSize:10, color:C.muted, fontFamily:"monospace", marginTop:2 }}>JPG, PNG, HEIC — stored locally in your browser</div>
                  <input type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => set({photoUrl: ev.target.result});
                    reader.readAsDataURL(file);
                  }}/>
                </label>
            }
            {generatingRecipe
              ? <div style={{ textAlign:"center", padding:14, fontFamily:"monospace", fontSize:12, color:C.brown }}>✨ Generating recipe from your bake…</div>
              : <button style={{ ...S.btn, width:"100%", padding:12, fontSize:13, marginTop:4,
                  opacity:((!bf.recipeId && !bf.isFreeform)||!bf.notes)?0.45:1 }}
                  onClick={saveBake}
                  disabled={(!bf.recipeId && !bf.isFreeform)||!bf.notes}>
                  {editingBakeId ? "Update Bake" : bf.isFreeform ? "✨ Generate Recipe & Save" : "Save Bake"}
                </button>
            }
          </div>
        </div>
      </main>
    </div>
  );

  if (view==="recipes") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved} syncing={syncing} profile={profile} onSwitchProfile={()=>{setProfile(null);setLoaded(false);setView("journal");}}/>
      <main style={S.main}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22 }}>
          <div><h1 style={S.title}>Recipes</h1><p style={S.sub}>{recipes.length} base formulas</p></div>
          <button style={S.btn} onClick={()=>setView("newRecipe")}>+ New Recipe</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
          {recipes.map(r=>{
            const rb=bakes.filter(b=>b.recipeId===r.id);
            return (
              <div key={r.id} style={{ ...S.card, cursor:"pointer" }} onClick={()=>{ setSelRecipe(r); setScale(1); setView("recipeDetail"); }}>
                <div style={{ position:"absolute", top:0, right:0, background:C.brown, color:"#f5e6c8", padding:"3px 10px", fontSize:10, fontFamily:"monospace", borderRadius:"0 4px 0 8px" }}>{r.hydration}% hydration</div>
                <h2 style={{ fontStyle:"italic", fontSize:17, fontWeight:600, marginBottom:3, paddingRight:85 }}>{r.name}</h2>
                {r.author && <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:5 }}>by {r.author}</div>}
                <p style={{ fontSize:12, color:"#6b5040", lineHeight:1.55, marginBottom:8, fontStyle:"italic" }}>{r.description}</p>
                <div style={{ marginBottom:8 }}>{(r.tags||[]).map(t=><span key={t} style={S.tag}>{t}</span>)}</div>
                <hr style={S.divider}/>
                <div style={{ display:"flex", gap:12, fontFamily:"monospace", fontSize:10, color:C.muted }}>
                  <span>{rb.length} bake{rb.length!==1?"s":""}</span>
                  <span>{rb.filter(b=>b.isVariant).length} variant{rb.filter(b=>b.isVariant).length!==1?"s":""}</span>
                  {rb.length>0 && <span>avg {(rb.reduce((s,b)=>s+b.rating,0)/rb.length).toFixed(1)}★</span>}
                </div>
              </div>
            );
          })}
        </div>
      </main>
    </div>
  );

  if (view==="recipeDetail" && selRecipe) {
    const r=selRecipe;
    const rb=bakes.filter(b=>b.recipeId===r.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const canon=rb.filter(b=>!b.isVariant), vars=rb.filter(b=>b.isVariant);
    return (
      <div style={S.app}>
        {modal && <BakeModal bake={modal} recipe={r} onClose={()=>setModal(null)}/>}
        <Nav view={view} setView={setView} saved={saved} syncing={syncing} profile={profile} onSwitchProfile={()=>{setProfile(null);setLoaded(false);setView("journal");}}/>
        <main style={S.main}>
          <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("recipes")}>← Back</button>
          <div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
              <div>
                <h1 style={{ ...S.title, marginBottom:3 }}>{r.name}</h1>
                {r.author && <div style={{ fontFamily:"monospace", fontSize:10, color:C.muted, marginBottom:5 }}>by {r.author}</div>}
                <p style={{ fontStyle:"italic", color:"#6b5040", fontSize:13, marginBottom:8 }}>{r.description}</p>
                <div>{(r.tags||[]).map(t=><span key={t} style={S.tag}>{t}</span>)}</div>
              </div>
              <div style={{ textAlign:"center", background:C.ink, color:"#f5e6c8", padding:"10px 16px", borderRadius:4 }}>
                <div style={{ fontFamily:"monospace", fontSize:22 }}>{r.hydration}%</div>
                <div style={{ fontFamily:"monospace", fontSize:9, color:"#b89878" }}>HYDRATION</div>
              </div>
            </div>
          </div>
          <div style={S.g2}>
            <div style={S.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <h3 style={{ fontStyle:"italic", fontSize:15 }}>Ingredients</h3>
                <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>scale ×</span>
                  <input type="number" min="0.25" max="10" step="0.25" value={scale} onChange={e=>setScale(parseFloat(e.target.value)||1)}
                    style={{ width:54, padding:"3px 6px", border:`1.5px solid ${C.brown}`, borderRadius:3, fontFamily:"monospace", fontSize:14, textAlign:"center", background:"#faf7f0" }}/>
                </div>
              </div>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <tbody>{r.ingredients.map(ing=>(
                  <tr key={ing.id} style={{ borderBottom:"1px solid #f0e8d4" }}>
                    <td style={{ padding:"5px 0", fontSize:13 }}>{ing.name}</td>
                    <td style={{ padding:"5px 0", textAlign:"right", fontFamily:"monospace", fontSize:13, fontWeight:500, color:scale!==1?C.brown:C.ink }}>{sc(ing.amount)}{ing.unit}</td>
                  </tr>
                ))}</tbody>
              </table>
              {scale!==1 && <div style={{ marginTop:8, padding:"5px 9px", background:"#f5e6c8", borderRadius:3, fontFamily:"monospace", fontSize:10, color:C.brown }}>Scaled ×{scale}</div>}
            </div>
            <div style={S.card}>
              <h3 style={{ fontStyle:"italic", fontSize:15, marginBottom:12 }}>Method</h3>
              <ol style={{ paddingLeft:0, listStyle:"none", margin:0 }}>
                {r.steps.map((step,i)=>(
                  <li key={i} style={{ display:"flex", gap:8, marginBottom:10 }}>
                    <span style={{ minWidth:19, height:19, background:C.ink, color:"#f5e6c8", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0 }}>{i+1}</span>
                    <span style={{ fontSize:12, lineHeight:1.65 }}>{step}</span>
                  </li>
                ))}
              </ol>
            </div>
          </div>
          <div style={{ marginTop:4 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <h3 style={{ fontStyle:"italic", fontSize:18 }}>Bake History</h3>
              <button style={S.btnSm} onClick={()=>{ setBakeForm({...emptyBake(),recipeId:String(r.id)}); setView("newBake"); }}>+ Log a bake</button>
            </div>
            {rb.length===0 && <div style={{ ...S.card, textAlign:"center", color:C.muted, fontStyle:"italic", padding:26 }}>No bakes logged yet.</div>}
            {canon.length>0 && <>
              <div style={{ ...S.sh, marginBottom:6 }}>Base Recipe Bakes</div>
              {canon.map(bake=>(
                <div key={bake.id} style={S.bakeCard(false)} onClick={()=>setModal(bake)}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5, flexWrap:"wrap", gap:6 }}>
                    <div style={{ display:"flex", gap:9, flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                      <Loc location={bake.location}/><span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>🫕 {bake.vessel}</span>
                      {bake.folds?.length>0 && <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>✋ {bake.folds.length} folds</span>}
                    </div>
                    <div style={{ display:"flex", gap:6 }}><Badge outcome={bake.outcome}/><Stars value={bake.rating}/></div>
                  </div>
                  <p style={{ fontSize:12, fontStyle:"italic", margin:0 }}>{bake.notes.slice(0,120)}{bake.notes.length>120?"…":""}</p>
                </div>
              ))}
            </>}
            {vars.length>0 && <>
              <div style={{ ...S.sh, color:C.blue, margin:"14px 0 6px" }}>Variants</div>
              {vars.map(bake=>(
                <div key={bake.id} style={S.bakeCard(true)} onClick={()=>setModal(bake)}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5, flexWrap:"wrap", gap:6 }}>
                    <div>
                      <span style={{ background:C.blueLight, color:C.blue, padding:"1px 7px", borderRadius:20, fontSize:10, fontFamily:"monospace", marginRight:6 }}>{bake.variantName}</span>
                      <span style={{ fontFamily:"monospace", fontSize:10, color:C.muted }}>{new Date(bake.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                    </div>
                    <div style={{ display:"flex", gap:6 }}><Badge outcome={bake.outcome}/><Stars value={bake.rating}/></div>
                  </div>
                  {bake.substitutions && <p style={{ fontSize:11, color:"#4a6a78", fontStyle:"italic", marginBottom:4 }}>{bake.substitutions}</p>}
                  <p style={{ fontSize:12, fontStyle:"italic", margin:0 }}>{bake.notes.slice(0,120)}{bake.notes.length>120?"…":""}</p>
                </div>
              ))}
            </>}
          </div>
        </main>
      </div>
    );
  }

  if (view==="newRecipe") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved} syncing={syncing} profile={profile} onSwitchProfile={()=>{setProfile(null);setLoaded(false);setView("journal");}}/>
      <main style={S.main}>
        <button style={{ ...S.btnO, marginBottom:18, fontSize:12 }} onClick={()=>setView("recipes")}>← Back</button>
        <h1 style={S.title}>New Recipe</h1>
        <div style={{ maxWidth:640 }}>
          <div style={S.card}>
            <div style={S.g2}>
              <div><label style={S.label}>Recipe Name</label><input style={S.input} placeholder="e.g. Einkorn Sourdough" value={rf.name} onChange={e=>setR({name:e.target.value})}/></div>
              <div><label style={S.label}>Author / Source</label><input style={S.input} placeholder="e.g. Tartine" value={rf.author} onChange={e=>setR({author:e.target.value})}/></div>
            </div>
            <label style={S.label}>Description</label>
            <input style={S.input} placeholder="Tasting notes…" value={rf.description} onChange={e=>setR({description:e.target.value})}/>
            <div style={S.g2}>
              <div><label style={S.label}>Hydration (%)</label><input type="number" style={S.input} value={rf.hydration} onChange={e=>setR({hydration:parseInt(e.target.value)})}/></div>
              <div><label style={S.label}>Tags (comma-separated)</label><input style={S.input} placeholder="spelt, open crumb…" value={rf.tags} onChange={e=>setR({tags:e.target.value})}/></div>
            </div>
            <hr style={S.divider}/>
            <h3 style={{ fontStyle:"italic", marginBottom:10, fontSize:14 }}>Ingredients</h3>
            {rf.ingredients.map((ing,idx)=>(
              <div key={ing.id} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 65px", gap:6, marginBottom:5 }}>
                <input style={{ ...S.input, marginBottom:0 }} placeholder="Name" value={ing.name} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,name:e.target.value}:i)})}/>
                <input type="number" style={{ ...S.input, marginBottom:0 }} placeholder="Amount" value={ing.amount} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,amount:e.target.value}:i)})}/>
                <select style={{ ...S.input, marginBottom:0 }} value={ing.unit} onChange={e=>setR({ingredients:rf.ingredients.map((i,j)=>j===idx?{...i,unit:e.target.value}:i)})}>
                  <option>g</option><option>kg</option><option>ml</option><option>tsp</option><option>tbsp</option>
                </select>
              </div>
            ))}
            <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>setR({ingredients:[...rf.ingredients,{id:Date.now(),name:"",amount:"",unit:"g"}]})}>+ Ingredient</button>
            <hr style={S.divider}/>
            <h3 style={{ fontStyle:"italic", marginBottom:10, fontSize:14 }}>Method</h3>
            {rf.steps.map((step,i)=>(
              <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"flex-start" }}>
                <span style={{ minWidth:19, height:19, background:"#e8dcc8", color:"#5a3e28", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:9, flexShrink:0, marginTop:7 }}>{i+1}</span>
                <textarea style={{ ...S.input, marginBottom:0, resize:"vertical", minHeight:40 }} placeholder={`Step ${i+1}…`} value={step} onChange={e=>setR({steps:rf.steps.map((s,j)=>j===i?e.target.value:s)})}/>
              </div>
            ))}
            <button style={{ ...S.btnSm, marginBottom:14 }} onClick={()=>setR({steps:[...rf.steps,""]})}>+ Step</button>
            <button style={{ ...S.btn, width:"100%", padding:11, fontSize:13, opacity:!rf.name?0.45:1 }} onClick={saveRecipe} disabled={!rf.name}>Save Recipe</button>
          </div>
        </div>
      </main>
    </div>
  );

  if (view==="pantry") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved} syncing={syncing} profile={profile} onSwitchProfile={()=>{setProfile(null);setLoaded(false);setView("journal");}}/>
      <main style={S.main}><FlourPantry flours={flours} setFlours={setFlours}/></main>
    </div>
  );

  if (view==="stats") return (
    <div style={S.app}>
      <Nav view={view} setView={setView} saved={saved} syncing={syncing} profile={profile} onSwitchProfile={()=>{setProfile(null);setLoaded(false);setView("journal");}}/>
      <main style={S.main}><StatsView bakes={bakes} recipes={recipes}/></main>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
